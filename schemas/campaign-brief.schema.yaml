# campaign-brief.schema.yaml v1
# /campaign new 가 생성하고, /preview, /publish 가 갱신.

$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://upflow.io/schemas/campaign-brief/v1"
title: CampaignBrief
type: object
required: [version, slug, topic, goal, channels, cadence, status]
properties:
  version:  { const: 1 }
  slug:     { type: string, pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}-.+" }
  topic:    { type: string, minLength: 2, maxLength: 200 }
  goal:
    type: string
    enum: [awareness, lead, conversion, retention, recruiting]
  channels:
    type: array
    minItems: 1
    items: { type: string }
    description: "plugin.json 의 channels[].id 와 일치"
  cadence:
    type: string
    enum: [single, thread, series-3, series-5]
  constraints:
    type: object
    properties:
      maxLengthOverride: { type: [integer, "null"] }
      mustInclude:       { type: array, items: { type: string } }
      mustExclude:       { type: array, items: { type: string } }
  status:
    type: object
    additionalProperties:
      type: string
      enum: [drafting, preview, approved, scheduled, published, failed, skipped]
    description: "채널 id → 상태"
  schedule:
    type: object
    description: "예약 발행 (선택)"
    additionalProperties:
      type: string
      format: date-time
  meta:
    type: object
    properties:
      createdAt:    { type: string, format: date-time }
      updatedAt:    { type: string, format: date-time }
      profileBrand: { type: [string, "null"] }
