keyMessage: K-뷰티 sourcing 첫 질문 "Why Korea?" — 산업 규모·R&D·트렌드 속도·ODM 빅3 데이터로 답하는 9가지 우위
contentPoints:
  - 한국 화장품 수출 100억 달러 돌파 (KOFOTI 2025) — 글로벌
  - 시장 R&D 비중 8% (글로벌 평균 2.5% 대비 3배)
  - 신제품 출시 사이클 평균 4개월 (글로벌 18개월)
  - ODM 빅3 (Cosmax · Kolmar Korea · Kosmecca) = 글로벌 600+ 브랜드 제조
  - MFDS 신성분 등록 연 200+ (FDA · EMA 합산 대비 빠른 처리)
  - K-뷰티 인플루언서 생태계 — TikTok
  - 정부 지원 — KOTRA, KOFOTI 수출 인큐베이션 + 박람회 보조
  - 패키지 디자인 R&D — 펌프, 잼팩, 1g 스틱 등 폼팩터 혁신 글로벌 표준화
  - 인디 브랜드 트랙레코드 — Anua, Beauty of Joseon, Skin1004 의 Sephora 진입 패턴
  - 본 인사이트 카드 풀버전 → cos.totaro.co.kr/insights/kbeauty-why-korea-9-advantages
angle: 데이터·통계·수치 중심. K-뷰티 시장 미신 또는 추상적 자랑이 아니라 검증 가능한 사실. carousel = 1 hook(9 stat strip) → 2 산업 데이터
  → 3 R&D + 트렌드 속도 → 4 인디 브랜드 케이스 → 5 CTA.
notes: |
