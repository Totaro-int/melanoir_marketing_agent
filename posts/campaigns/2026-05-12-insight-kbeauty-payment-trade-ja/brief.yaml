keyMessage: K-Beauty初回取引の最大不安 = 決済。LC·TT·KSure·為替ヘッジを1枚に整理
contentPoints:
  - LC (Letter of Credit) — 最も安全、30~60日決済、発行手数料0.1~0.3%、大型取引の標準
  - TT (Telegraphic Transfer) — 最速、60~80%前金 + 残金(B/L写し確認後)、K-Beauty取引の70%以上
  - KSure 貿易信用保険 — 韓国政府が損失の90%負担、B2B初回取引のセーフティネット、保険料0.3~1.5%
  - 為替リスク — KRW/USD 6ヶ月変動幅5~10%、先物ヘッジ費用 0.5~1%/年
  - 推奨組み合わせ — FOB Busan + TT 30/70 + KSure (初回取引標準)
  - 偽造·詐欺防止 — 正規事業者登録確認、KSure登録可能事業者のみ取引
