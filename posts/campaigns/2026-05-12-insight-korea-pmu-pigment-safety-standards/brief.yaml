topic: 한국 PMU(반영구) 색소 안전 표준 — 28-FREE · 무균 · 자극 51% 감소 가이드
goal: education
channels:
  - linkedin
cadence: series-5
keyMessage: PMU 색소, 발색 전에 검증부터. 28-FREE 불검출 · 무균 시험 적합 · 자극 인자 51% 감소 — 한국 PMU 시장에 새 안전 표준이 도착
contentPoints:
  - PMU 색소 선택 1순위는 색감이 아니라 시험성적서 — 시술 클레임 1차 책임 = 아티스트
  - 28-FREE — 중금속 5·보존제 8·잔류용매 7·알러젠 8 = 28종 N.D.(Not Detected, 불검출)
  - 무균 시험(Sterility) Negative — 일회용 멸균팩 단위 검증, 교차오염 0
  - NO assay 자극 인자 51% 감소 — 대조군 14.32 → 멜라누아 엠보 6.90
  - 일회용 멸균팩 — -20℃ ~ 80℃ 1년 가속 노화 안정, 1회 사용 후 폐기
  - 보증서 등록 번호 — 정품·배치·이력 추적 가능, Professionals Only 유통
  - 한국 PMU 카테고리에 등장한 새 표준 — 글로벌 시장 reference point 가능성
  - 본 인사이트 카드 풀버전 → cos.totaro.co.kr/insights/korea-pmu-pigment-safety-standards
angle: 광고형 product promotion 회피. '한국 PMU 색소 카테고리에 28-FREE·무균·자극 감소라는 새 안전 표준이 등장했다' 정보 가이드 톤. 멜라누아
  엠보는 사례로만 인용, 검증 데이터 자체를 중심으로 풀이. carousel = 1 hook(28-FREE / 무균 / 51%↓) → 2 28-FREE 풀이 → 3 무균 +
  멸균팩 → 4 NO assay → 5 한국 PMU 시장의 새 표준 + CTA.
notes: |
