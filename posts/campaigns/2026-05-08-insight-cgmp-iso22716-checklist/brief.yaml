contentPoints:
  - GMP 인증서 원본 PDF 요청 (CB 인증번호 + 발급일 + 만료일)
  - 시설 사진(외관·내부 라인·QC 실험실) 5장 이상 — 워터마크/메타데이터 검증
  - QC 절차서 페이지 수 (50p 미만 = warning, 평균 80~150p)
  - 마이크로/안전성 시험 로컬 실험실 vs. 외주 — 외주는 시간 lag 큼
  - 컴플레인 핸들링 SOP — 90일 내 평균 응답 시간 5일 이하 권장
  - 다운로드 PDF — 풀 22항목 체크리스트 + 메일 캡처 게이트
  - 본 인사이트 카드 풀버전 → cos.totaro.co.kr/insights/korea-cgmp-iso22716-audit-checklist
angle: LinkedIn newsletter 형식 — 800단어 장문, B2B 권위 톤. 도입부 1단락에 '왜 이게 중요한가' + 본문 5섹션 + PDF 다운로드 게이트.
  형용사 최소화, 수치·기준 위주.
