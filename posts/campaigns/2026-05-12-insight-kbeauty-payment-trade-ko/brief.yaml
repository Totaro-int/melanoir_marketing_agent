keyMessage: K-뷰티 첫 거래의 가장 큰 불안 = 결제. LC·TT·KSure·환헷지를 한 장으로 정리
contentPoints:
  - LC (Letter of Credit) — 가장 안전, 30~60일 결제, 발급 수수료 0.1~0.3%, 큰 거래에 표준
  - TT (Telegraphic Transfer) — 가장 빠름, 60~80% 선급금 + 40~20% 잔금 (B/L 사본 확인 후)
  - KSure 무역신용보험 — 한국 정부가 손실 90% 부담, B2B 첫 거래 안전망, 보험료 0.3~1.5%
  - 환리스크 — KRW/USD 6개월 변동 폭 5~10%, 선물환 헷지 비용 0.5~1%/년
  - 권장 조합 — FOB Busan + TT 30/70 + KSure (첫 거래 표준)
  - 위조 / 사기 방지 — 정품 사업자등록 확인, KSure 등록 가능 사업자만 거래
  - 본 인사이트 카드 풀버전 → cos.totaro.co.kr/insights/kbeauty-payment-trade-lc-tt-insurance
angle: B2B commercial 페인 정조준. carousel = 1 hook(결제가 가장 큰 불안) → 2 LC vs TT 비교 → 3 KSure 보험 → 4 환리스크 +
  헷지 → 5 권장 조합 + CTA.
notes: |
  B2B 첫 거래 인디 브랜드의 가장 큰 불안 = 결제. 카드 #6 (물류) 와 시너지.
  데이터 출처 — KOTRA 무역실무 가이드, KSure 공시 자료.
