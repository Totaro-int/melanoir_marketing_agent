contentPoints:
  - OEM (Original Equipment Manufacturing) — 우리 포뮬러 + 우리 라벨, 제조만 위탁
  - ODM (Original Design Manufacturing) — 제조사 포뮬러 + 우리 라벨, R&D 시간 X
  - Private Label — 제조사 기성 제품 + 라벨만 변경, 가장 빠름 (4~6주)
  - 결정 기준 — 자본·시간·차별화 요구·MOQ 4축 매트릭스
  - K-뷰티 특화 — Cosmax · Kolmar · Kosmecca 같은 빅 ODM 라인 vs. 신생 OEM
  - 본 인사이트 카드 풀버전 → cos.totaro.co.kr/insights/kbeauty-oem-odm-private-label-decision
angle: Pinterest = 9:16 saveable 인포그래픽 (결정 트리), 텍스트 오버레이 OK, 보드 시리즈 일관성. Instagram = 카드뉴스 6장 또는
  Reels 30초 stop-motion 결정 트리.
notes: |
  Pinterest 는 K-뷰티 SEO 가장 저평가 채널 — 한 번 핀 = 3~6년 evergreen 트래픽.
  결정-트리 포맷 save 비율 12~18% (일반 핀의 6~9배).
  Instagram 은 reach 보강용. Reels 형식이 explore 노출 가장 좋음.
