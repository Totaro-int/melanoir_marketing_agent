topic: K-Beauty Payment & Trade — LC, TT, Trade Credit Insurance, FX Risk in 5 Minutes
goal: education
channels:
  - linkedin
cadence: series-5
keyMessage: First K-beauty deal's biggest fear is payment. LC, TT, KSure, and FX hedging in one page
contentPoints:
  - LC (Letter of Credit) — safest, 30 to 60 day settlement, issuance fee 0.1 to 0.3 percent,
    standard for large deals
  - TT (Telegraphic Transfer) — fastest, 60 to 80 percent deposit + balance after B/L copy, used in
    70+ percent of K-beauty deals
  - KSure Trade Credit Insurance — Korean government covers 90 percent of loss, B/Sb first-deal
    safety net, premium 0.3 to 1.5 percent
  - FX risk — KRW/USD 6 month volatility 5 to 10 percent, forward hedge cost 0.5 to 1 percent per
    year
  - Recommended combo — FOB Busan + TT 30/70 + KSure (first-deal standard)
  - Counterfeit / fraud prevention — verify business registration, only deal with KSure-registered
    suppliers
  - Full version of this insight card →
