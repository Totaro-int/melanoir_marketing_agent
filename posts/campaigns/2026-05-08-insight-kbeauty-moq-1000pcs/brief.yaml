keyMessage: Korean OEM 한테 MOQ 500 보냈을 때 답장 안 오는 진짜 이유 — 그리고 1,000pcs 미만으로 뚫는 3가지 길
contentPoints:
  - 한국 OEM 평균 MOQ = 1,000~3,000pcs (line setup 비용 분산 한계)
  - 500pcs 견적은 line stop time 손실 → 답장 대신 무시가 합리적
  - 우회 1 — 충진 위탁(filling-only) 라인 보유 OEM 찾기 (200~500pcs 가능)
  - 우회 2 — Pre-stock formula 카탈로그(Stock formula + custom label)
  - 우회 3 — Co-purchase / 공동 OEM (다른 인디 브랜드와 같은 라인 분할)
  - 본 인사이트 카드 풀버전 → cos.totaro.co.kr/insights/kbeauty-moq-1000pcs-barrier
