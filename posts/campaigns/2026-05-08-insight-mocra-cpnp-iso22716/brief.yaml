contentPoints:
  - 미국 MoCRA 2023.12 발효 — 시설 등록 + 제품 리스팅 + Responsible Person 필수
  - EU CPNP — Responsible Person 이 EU 내 위임 + CPSR(안전성 평가서) 동봉
  - ISO 22716 글로벌 GMP — 대형 리테일(Whole Foods·Sephora·Target) 사실상 필수
  - 한국 MFDS CGMP ↔ ISO 22716 거의 동등 — 인증서가 없으면 reject 빈번
  - MoCRA 등록비 $0 / 잘못 입력 시 통관 후 Recall 명령 — 함정
