<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Marketing Agent Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0c;
    --panel: #131318;
    --panel-2: #1a1a22;
    --border: #2a2a35;
    --text: #e8e8eb;
    --text-dim: #888;
    --text-mute: #555;
    --accent: #50c878;
    --accent-blue: #7a8aff;
    --accent-orange: #ffb84a;
    --accent-pink: #ff7a8a;
    --danger: #ff5a5a;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    width: 100%;
    background: var(--bg);    /* 흰색 fallback 방지 */
  }
  html { height: 100%; }
  body {
    min-height: 100vh;
    overflow-x: hidden;
    color: var(--text);
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--accent-blue); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .layout {
    display: block;
    width: 100%;
    min-height: 100vh;
    position: relative;
    overflow: visible;
  }

  /* Sidebar — fixed 라 main 스크롤에 영향 안 줌 */
  .sidebar {
    position: fixed; top: 0; left: 0;
    width: 240px; height: 100vh;
    background: var(--panel);
    border-right: 1px solid var(--border);
    padding: 24px 16px;
    overflow-y: auto;
    z-index: 10;
    display: flex;
    flex-direction: column;
  }
  .brand {
    font-size: 16px; font-weight: 700;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .brand-sub {
    font-size: 11px; color: var(--text-mute);
    margin-bottom: 28px;
  }
  .nav-item {
    display: block;
    padding: 10px 14px;
    border-radius: 8px;
    color: var(--text-dim);
    cursor: pointer;
    margin-bottom: 4px;
    transition: background .12s, color .12s;
  }
  .nav-item:hover { background: var(--panel-2); color: var(--text); }
  .nav-item.active {
    background: var(--panel-2);
    color: var(--text);
    font-weight: 600;
  }

  /* Main content — sidebar 옆 240px 부터 시작, 화면 너비 100% 활용 */
  .main {
    margin-left: 240px;
    width: calc(100% - 240px);   /* 명시적 width — 우측 빈 공간 방지 */
    padding: 32px 40px 200px 40px;
    min-height: 100vh;
    overflow: visible;
  }
  h1 {
    margin: 0 0 8px;
    font-size: 24px;
    font-weight: 700;
  }
  .h1-sub {
    color: var(--text-dim);
    font-size: 13px;
    margin-bottom: 28px;
  }
  h2 {
    margin: 32px 0 16px;
    font-size: 16px;
    font-weight: 700;
    border-bottom: 1px solid var(--border);
    padding-bottom: 10px;
  }

  /* Cards */
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 12px;
  }
  .card.compact { padding: 12px 14px; }
  .card-row {
    display: flex; align-items: center; gap: 12px;
  }
  .card-title { font-weight: 600; font-size: 14px; flex: 1; }
  .card-meta { color: var(--text-dim); font-size: 12px; }

  /* Pills */
  .pills { display: flex; flex-wrap: wrap; gap: 6px; }
  .pill {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 500;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text-dim);
  }
  .pill.published { background: rgba(80, 200, 120, 0.12); color: var(--accent); border-color: rgba(80, 200, 120, 0.3); }
  .pill.approved  { background: rgba(122, 138, 255, 0.12); color: var(--accent-blue); border-color: rgba(122, 138, 255, 0.3); }
  .pill.preview   { background: rgba(255, 184, 74, 0.12); color: var(--accent-orange); border-color: rgba(255, 184, 74, 0.3); }
  .pill.drafting  { color: var(--text-dim); }
  .pill.failed    { background: rgba(255, 90, 90, 0.12); color: var(--danger); border-color: rgba(255, 90, 90, 0.3); }
  .pill.pending   { color: var(--text-mute); }

  .pill-icon { font-size: 10px; }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 12px;
  }
  .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }

  /* Stats row */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
  .stat {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
  }
  .stat-label { color: var(--text-dim); font-size: 12px; margin-bottom: 6px; }
  .stat-value { font-size: 28px; font-weight: 700; color: var(--text); }
  .stat-change { font-size: 12px; color: var(--accent); margin-top: 2px; }

  /* Calendar */
  .calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    background: var(--panel);
    border-radius: 12px;
    padding: 18px;
    border: 1px solid var(--border);
  }
  .cal-head { font-size: 12px; color: var(--text-mute); text-align: center; padding: 8px 0; font-weight: 600; letter-spacing: 0.04em; }
  .cal-cell {
    min-height: 92px;
    padding: 10px 12px;
    border-radius: 10px;
    background: var(--panel-2);
    font-size: 11px;
    border: 1px solid transparent;
    transition: all .15s;
    overflow: hidden;
    position: relative;
  }
  .cal-cell:not(.empty) { cursor: pointer; }
  .cal-cell:not(.empty):hover {
    border-color: var(--text-dim);
    transform: translateY(-1px);
    background: rgba(255,255,255,0.03);
  }
  .cal-cell.empty { opacity: 0.25; cursor: default; }
  .cal-cell.today { border-color: var(--accent); }
  .cal-cell.has-event { border-color: var(--accent-blue); }
  .cal-cell.selected {
    background: rgba(122,138,255,0.10);
    border-color: var(--accent-blue);
    box-shadow: 0 0 0 3px rgba(122,138,255,0.18), 0 6px 20px rgba(122,138,255,0.18);
    transform: translateY(-2px);
  }
  .cal-cell.has-event::after {
    content: '';
    position: absolute;
    top: 8px; right: 8px;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent-blue);
  }
  .cal-day { font-weight: 600; margin-bottom: 6px; font-size: 14px; color: var(--text); }
  .cal-cell.today .cal-day { color: var(--accent); }
  .cal-cell.selected .cal-day { color: var(--accent-blue); }
  .cal-event-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent-blue);
    display: inline-block; margin-right: 3px;
  }
  .cal-event-title {
    font-size: 10px;
    color: var(--text-dim);
    text-overflow: ellipsis;
    white-space: nowrap;
    overflow: hidden;
  }

  /* ── 선택된 날짜의 캠페인 + 큰 채널 카드 그리드 ── */
  .day-detail {
    margin-top: 26px;
    padding-bottom: 80px;
  }
  .day-detail-head {
    display: flex; align-items: baseline; gap: 14px;
    padding: 0 4px; margin-bottom: 16px;
  }
  .day-detail-head .date {
    font-size: 26px; font-weight: 700;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .day-detail-head .date .dim { color: var(--text-mute); font-weight: 500; }
  .day-detail-head .summary {
    color: var(--text-dim); font-size: 13px;
    margin-left: auto;
  }
  .day-camp-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 24px;
    margin-bottom: 16px;
  }
  .day-camp-card .camp-head {
    display: flex; align-items: baseline; gap: 12px;
    margin-bottom: 6px;
  }
  .day-camp-card .camp-title {
    font-size: 17px; font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .day-camp-card .camp-meta {
    color: var(--text-dim); font-size: 12px;
    margin-left: auto;
  }
  .day-camp-card .camp-key {
    color: var(--text-dim); font-size: 13px;
    margin-bottom: 16px;
    line-height: 1.5;
  }
  .ch-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 12px;
  }
  .ch-card {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 14px;
    cursor: pointer;
    transition: all .15s;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .ch-card:hover {
    transform: translateY(-2px);
    border-color: var(--text-dim);
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  }
  .ch-card .emoji { font-size: 28px; line-height: 1; margin-bottom: 6px; }
  .ch-card .name {
    font-size: 13px; font-weight: 600;
    color: var(--text);
    margin-bottom: 10px;
  }
  .ch-card .status-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
  }
  .ch-card .status-text {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 10px;
  }
  .ch-card .action {
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 8px;
    background: rgba(255,255,255,0.04);
    color: var(--text-dim);
    border: 1px solid var(--border);
    display: inline-block;
    transition: all .15s;
  }
  .ch-card:hover .action {
    color: var(--text);
    border-color: var(--text-dim);
  }
  /* 상태별 컬러 */
  .ch-card.published {
    border-color: rgba(80,200,120,0.35);
    background: linear-gradient(180deg, rgba(80,200,120,0.10), var(--panel-2));
  }
  .ch-card.published .status-dot { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .ch-card.published .status-text { color: var(--accent); }
  .ch-card.published .action { color: var(--accent); border-color: rgba(80,200,120,0.4); }

  .ch-card.approved {
    border-color: rgba(122,138,255,0.4);
    background: linear-gradient(180deg, rgba(122,138,255,0.10), var(--panel-2));
  }
  .ch-card.approved .status-dot { background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
  .ch-card.approved .status-text { color: var(--accent-blue); font-weight: 600; }
  .ch-card.approved .action { color: var(--accent-blue); border-color: rgba(122,138,255,0.45); background: rgba(122,138,255,0.10); }

  .ch-card.preview {
    border-color: rgba(255,184,74,0.35);
  }
  .ch-card.preview .status-dot { background: var(--accent-orange); }
  .ch-card.preview .status-text { color: var(--accent-orange); }

  .ch-card.failed {
    border-color: rgba(255,90,90,0.4);
    background: linear-gradient(180deg, rgba(255,90,90,0.08), var(--panel-2));
  }
  .ch-card.failed .status-dot { background: var(--danger); }
  .ch-card.failed .status-text { color: var(--danger); }
  .ch-card.failed .action { color: var(--danger); border-color: rgba(255,90,90,0.4); }

  .ch-card.drafting .status-dot { background: var(--text-mute); }
  .ch-card.drafting .status-text { color: var(--text-dim); }

  .ch-card.published::after {
    content: '↗';
    position: absolute;
    top: 10px; right: 12px;
    color: var(--accent);
    font-size: 14px;
    opacity: 0.7;
  }

  .day-empty {
    background: var(--panel);
    border: 1px dashed var(--border);
    border-radius: 14px;
    padding: 40px 20px;
    text-align: center;
    color: var(--text-dim);
    font-size: 14px;
  }
  .day-empty .emoji { font-size: 36px; display: block; margin-bottom: 10px; opacity: 0.5; }

  /* History */
  .hist-row {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  .hist-row:last-child { border-bottom: none; }
  .hist-time { color: var(--text-mute); font-size: 11px; min-width: 96px; }
  .hist-channel-tag {
    font-size: 11px; padding: 3px 8px; border-radius: 4px;
    background: var(--panel-2);
    color: var(--text-dim);
    min-width: 80px; text-align: center;
  }
  .hist-channel-tag.naver { color: #50c878; }
  .hist-channel-tag.tistory { color: #ffb84a; }
  .hist-channel-tag.brunch { color: var(--text-dim); }
  .hist-channel-tag.threads { color: #fff; }
  .hist-channel-tag.linkedin { color: #7a8aff; }
  .hist-channel-tag.instagram { color: #ff7a8a; }
  .hist-topic { flex: 1; }

  /* Empty state */
  .empty {
    text-align: center;
    color: var(--text-mute);
    padding: 60px 20px;
    border: 1px dashed var(--border);
    border-radius: 10px;
  }
  .empty-emoji { font-size: 36px; margin-bottom: 12px; opacity: 0.5; }

  /* Top bar */
  .topbar {
    display: flex; align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .now {
    color: var(--text-dim);
    font-size: 13px;
  }
  .refresh {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
  }
  .refresh:hover { background: var(--panel-2); }

  .btn-connect {
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--accent-blue);
    color: var(--accent-blue);
    padding: 10px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: background .12s;
    margin-top: 8px;
  }
  .btn-connect:hover {
    background: rgba(122, 138, 255, 0.12);
  }
  code {
    background: rgba(122, 138, 255, 0.12);
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* ── Pill 클릭 가능하게 ── */
  .pill.clickable { cursor: pointer; transition: transform .08s, background .12s; }
  .pill.clickable:hover { transform: translateY(-1px); filter: brightness(1.15); }

  /* ── Publish Drawer ── */
  .drawer-mask {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(2px);
    z-index: 100;
    opacity: 0; pointer-events: none;
    transition: opacity .2s;
  }
  .drawer-mask.open { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed; top: 0; right: 0; height: 100vh;
    width: min(960px, 96vw);
    background: var(--panel);
    border-left: 1px solid var(--border);
    box-shadow: -10px 0 40px rgba(0,0,0,0.5);
    z-index: 101;
    transform: translateX(100%);
    transition: transform .25s cubic-bezier(.4,0,.2,1), width .25s cubic-bezier(.4,0,.2,1);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .drawer.open { transform: translateX(0); }
  /* 발행 진행 중에는 더 넓게 — hero 보드 위주 */
  .drawer.publishing { width: min(1200px, 98vw); }
  .drawer-head {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
    background: var(--panel-2);
  }
  .drawer-head .channel-tag { font-weight: 600; font-size: 14px; color: var(--accent-blue); }
  .drawer-head .topic { flex: 1; font-size: 13px; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .drawer-close {
    background: transparent; border: 1px solid var(--border);
    color: var(--text-dim); cursor: pointer;
    width: 28px; height: 28px; border-radius: 6px;
    font-size: 16px; line-height: 1;
  }
  .drawer-close:hover { color: var(--text); border-color: var(--text-dim); }
  .drawer-body {
    flex: 1; overflow-y: auto;
    padding: 18px 20px;
  }
  .drawer-body::-webkit-scrollbar { width: 8px; }
  .drawer-body::-webkit-scrollbar-track { background: transparent; }
  .drawer-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .drawer-section { margin-bottom: 18px; }
  .drawer-section h3 {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--text-dim); margin: 0 0 8px 0; font-weight: 600;
  }

  .preview-box {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 18px;
    max-height: 360px;
    overflow-y: auto;
    font-size: 13px; line-height: 1.7;
  }
  .preview-toolbar {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 8px;
  }
  .preview-toolbar .btn-edit {
    background: rgba(122,138,255,0.10);
    border: 1px solid rgba(122,138,255,0.3);
    color: var(--accent-blue);
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px; cursor: pointer;
    margin-left: auto;
    transition: all .12s;
  }
  .preview-toolbar .btn-edit:hover {
    background: rgba(122,138,255,0.18);
  }
  .preview-toolbar .btn-edit.danger {
    background: rgba(255,90,90,0.10);
    border-color: rgba(255,90,90,0.3);
    color: var(--danger);
  }
  .editor-area {
    background: var(--panel-2);
    border: 1px solid var(--accent-blue);
    border-radius: 8px;
    padding: 14px 16px;
    box-shadow: 0 0 0 3px rgba(122,138,255,0.10);
  }
  .editor-area textarea {
    width: 100%;
    min-height: 320px;
    max-height: 600px;
    background: transparent;
    border: 0;
    color: var(--text);
    font-family: 'JetBrains Mono', 'Pretendard', monospace;
    font-size: 13px;
    line-height: 1.6;
    resize: vertical;
    outline: none;
  }
  .editor-actions {
    display: flex; gap: 8px; align-items: center;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .editor-actions .info {
    font-size: 11px; color: var(--text-mute);
    margin-right: auto;
  }
  .editor-actions button {
    padding: 8px 14px;
    border-radius: 6px;
    font-size: 12px; cursor: pointer;
    font-weight: 500;
    transition: all .12s;
  }
  .btn-save {
    background: var(--accent-blue);
    border: 0; color: #0a0a0c;
  }
  .btn-save:hover { opacity: 0.85; }
  .btn-cancel {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
  }
  .btn-cancel:hover { color: var(--text); border-color: var(--text-dim); }
  .save-toast {
    position: fixed;
    bottom: 30px; right: 30px;
    background: var(--accent);
    color: #0a0a0c;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 13px; font-weight: 600;
    box-shadow: 0 8px 30px rgba(80,200,120,0.4);
    z-index: 200;
    animation: slideUp .3s cubic-bezier(.4,0,.2,1);
  }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .preview-box h2 { font-size: 16px; margin: 18px 0 8px 0; color: var(--text); }
  .preview-box h3 { font-size: 14px; margin: 14px 0 6px 0; color: var(--text); text-transform: none; letter-spacing: 0; font-weight: 600; }
  .preview-box p { margin: 8px 0; color: var(--text); }
  .preview-box blockquote {
    margin: 12px 0; padding: 8px 14px;
    border-left: 3px solid var(--accent-blue);
    color: var(--text-dim); font-style: italic;
  }
  .preview-box .img-marker {
    display: inline-block;
    background: rgba(255, 184, 74, 0.12);
    border: 1px dashed var(--accent-orange);
    color: var(--accent-orange);
    padding: 4px 10px; border-radius: 6px;
    font-size: 11px; font-family: monospace;
    margin: 6px 0;
  }
  .preview-box ul, .preview-box ol { padding-left: 22px; }
  .preview-box code { background: rgba(255,255,255,0.06); }

  .img-thumbs { display: flex; gap: 8px; flex-wrap: wrap; }
  .img-thumbs img {
    width: 64px; height: 64px; object-fit: cover;
    border: 1px solid var(--border); border-radius: 6px;
  }

  .guardian-card {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 12px;
  }
  .guardian-card.ok { border-left: 3px solid var(--accent); }
  .guardian-card.warn { border-left: 3px solid var(--accent-orange); }
  .guardian-card.block { border-left: 3px solid var(--danger); }

function formatRelTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60) return '방금';
  if (diff < 3600) return Math.floor(diff/60) + '분 전';
  if (diff < 86400) return Math.floor(diff/3600) + '시간 전';
  if (diff < 86400*7) return Math.floor(diff/86400) + '일 전';
  return d.toISOString().slice(5, 10);
}

function formatDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit' });
}

function formatTime(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });

// ─── renderers ─────────────────────────────────────────────────
function statusPill(ch, status, slug) {
  const cls = 'pill ' + status + (slug ? ' clickable' : '');
  const onclick = slug
    ? ' onclick="openDrawer(\'' + encodeURIComponent(slug).replace(/\'/g, "\\'") + "', '" + ch + '\')"'
    : '';
  return '<span class="' + cls + '"' + onclick + '>' + (CHANNEL_LABEL[ch] || ch) + ' · ' + status + '</span>';
}

function channelTag(ch) {
  return '<span class="hist-channel-tag ' + ch + '">' + (CHANNEL_LABEL[ch] || ch) + '</span>';
}

function renderToday() {
  const data = cache.today;
  if (!data) return '<div class="empty">⏳ 로딩…</div>';
  const items = data.items || [];

  // Stats
  let publishedToday = 0, pending = 0, drafts = 0, total = items.length;
  for (const c of items) {
    for (const ch of Object.values(c.channelData)) {
      if (ch.status === 'published') publishedToday++;
      else if (ch.status === 'pending') pending++;
      else if (ch.status === 'drafting') drafts++;
    }
  }

  let html = '<div class="stats">';
  html += '<div class="stat"><div class="stat-label">오늘 발행 완료</div><div class="stat-value">' + publishedToday + '</div></div>';
  html += '<div class="stat"><div class="stat-label">대기 중</div><div class="stat-value">' + pending + '</div></div>';
  html += '<div class="stat"><div class="stat-label">작성 중</div><div class="stat-value">' + drafts + '</div></div>';
  html += '<div class="stat"><div class="stat-label">오늘 캠페인</div><div class="stat-value">' + total + '</div></div>';
  html += '</div>';

  if (!items.length) {
    html += '<div class="empty"><div class="empty-emoji">📭</div>오늘 진행 중인 캠페인 없음<br><span style="color:var(--text-mute);font-size:12px;">/sns-campaign-new "주제" 로 새 캠페인 시작</span></div>';
    return html;
  }

  html += '<h2>진행 중인 캠페인</h2><div class="grid">';
  for (const c of items) {
    html += '<div class="card">';
    html += '<div class="card-row" style="margin-bottom:8px;">';
    html += '<div class="card-title">' + escapeHtml(c.topic) + '</div>';
    html += '<span class="card-meta">' + formatRelTime(c.updatedAt) + '</span>';
    html += '</div>';
    html += '<div class="card-meta" style="margin-bottom:10px;">' + (c.profileBrand || '—') + ' · ' + c.goal + (c.blogMode ? ' · ' + c.blogMode : '') + '</div>';
    html += '<div class="pills">';
    for (const [ch, d] of Object.entries(c.channelData)) {
      html += statusPill(ch, d.status, c.slug);
    }
    html += '</div>';
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function renderCalendar() {
  const data = cache.calendar;
  const sched = cache.schedule;
  if (!data) return renderOnboardingStatus() + '<div class="empty">⏳ 로딩…</div>';

  const month = data.month;
  const days = data.days || {};
  const today = new Date().toISOString().slice(0, 10);
  const slots = sched?.slots || [];

  // 첫 화면 — 사용자가 어디서 시작해야 할지 명확하게
  const statusBar = renderOnboardingStatus();

  // Schedule slots header
  let slotHtml = statusBar;
  if (slots.length) {
    slotHtml += '<h2>⏰ 예약 슬롯 (slots.yaml — cron 반복 큐)</h2>';
    slotHtml += '<div class="grid">';
    for (const s of slots) {
      slotHtml += '<div class="card">';
      slotHtml += '<div class="card-row" style="margin-bottom:6px;">';
      slotHtml += '<div class="card-title">' + escapeHtml(s.topic || '—') + '</div>';
      slotHtml += '<span class="pill approved">' + (s.cadence || 'single') + '</span>';
      slotHtml += '</div>';
      slotHtml += '<div class="card-meta" style="margin-bottom:8px;">';
      slotHtml += (s.goal || '—') + ' · 실행 ' + (s.runCount || 0) + '회';
      if (s.lastRun) slotHtml += ' · 마지막 ' + formatRelTime(s.lastRun);
      slotHtml += '</div>';
      if (s.channels?.length) {
        slotHtml += '<div class="pills">';
        for (const ch of s.channels) slotHtml += '<span class="pill">' + (CHANNEL_LABEL[ch] || ch) + '</span>';
        slotHtml += '</div>';
      }
      slotHtml += '</div>';
    }
    slotHtml += '</div>';
  }

  // build grid for the month
  const [y, m] = month.split('-').map(Number);
  const firstDay = new Date(y, m - 1, 1);
  const lastDay = new Date(y, m, 0);
  const startWeekday = firstDay.getDay();
  const daysInMonth = lastDay.getDate();

  let html = slotHtml;
  html += '<h2 style="margin-bottom:14px;">' + month + ' — 날짜를 클릭해서 캠페인을 확인하세요</h2>';
  html += '<div class="calendar">';
  for (const wd of ['일','월','화','수','목','금','토']) {
    html += '<div class="cal-head">' + wd + '</div>';
  }
  // empty cells before
  for (let i = 0; i < startWeekday; i++) {
    html += '<div class="cal-cell empty"></div>';
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = month + '-' + String(d).padStart(2, '0');
    const events = days[dateStr] || [];
    const isToday = dateStr === today;
    const isSelected = dateStr === selectedDate;
    const cls = ['cal-cell'];
    if (events.length) cls.push('has-event');
    if (isToday) cls.push('today');
    if (isSelected) cls.push('selected');
    html += '<div class="' + cls.join(' ') + '" onclick="selectDate(\'' + dateStr + '\')">';
    html += '<div class="cal-day">' + d + (isToday ? ' · 오늘' : '') + '</div>';
    for (const e of events.slice(0, 2)) {
      html += '<div class="cal-event-title"><span class="cal-event-dot"></span>' + escapeHtml(e.topic.slice(0, 18)) + '</div>';
    }
    if (events.length > 2) {
      html += '<div class="cal-event-title" style="color:var(--text-mute);">+' + (events.length - 2) + '개 더</div>';
    }
    html += '</div>';
  }
  html += '</div>';

  // ── 선택된 날짜의 캠페인 + 큰 채널 카드 그리드 ──
  html += '<div class="day-detail">';
  html += renderDayDetail(selectedDate);
  html += '</div>';

  return html;
}

function selectDate(dateStr) {
  selectedDate = dateStr;
  // 캘린더 탭만 다시 렌더 (전체 fetch 안 함 — 즉각 반응)
  const active = document.querySelector('.nav-item.active')?.dataset.tab || 'calendar';
  renderTab(active);
}

function formatKoreanDate(iso) {
  const d = new Date(iso + 'T00:00:00');
  const wd = ['일','월','화','수','목','금','토'][d.getDay()];
  return (d.getMonth() + 1) + '월 ' + d.getDate() + '일 (' + wd + ')';
}

function renderDayDetail(dateStr) {
  const all = cache.campaigns?.campaigns || [];
  console.log('[renderDayDetail]', dateStr, 'total campaigns:', all.length);
  // 그 날짜에 활성/발행/생성된 캠페인 모두
  const matched = all.filter((c) => {
    if ((c.createdAt || '').startsWith(dateStr)) return true;
    if ((c.updatedAt || '').startsWith(dateStr)) return true;
    for (const ch of Object.values(c.channelData || {})) {
      if (ch.result?.publishedAt?.startsWith(dateStr)) return true;
    }
    return false;
  });

  const today = new Date().toISOString().slice(0, 10);
  let html = '';
  html += '<div class="day-detail-head">';
  html += '<span class="date">' + formatKoreanDate(dateStr) + '</span>';
  if (dateStr === today) html += '<span class="badge live" style="padding:4px 10px; border-radius:999px; font-size:11px; font-weight:600; background:rgba(80,200,120,0.15); color:var(--accent); border:1px solid rgba(80,200,120,0.4);">TODAY</span>';
  html += '<span class="summary">' + (matched.length ? matched.length + '개 캠페인' : '') + '</span>';
  html += '</div>';

  if (!matched.length) {
    html += '<div class="day-empty">';
    html += '<span class="emoji">📭</span>';
    html += '이 날짜에 캠페인이 없습니다.<br>';
    html += '<span style="font-size:12px; color:var(--text-mute); margin-top:6px; display:inline-block;">';
    html += '<code>node harness/bin/campaign-new.mjs "주제"</code> 로 새 캠페인 시작';
    html += '</span>';
    html += '</div>';
    return html;
  }

  for (const c of matched) {
    const chCount = Object.keys(c.channelData || {}).length;
    console.log('  campaign:', c.slug, 'channels:', chCount);
    html += '<div class="day-camp-card" oncontextmenu="showCampaignMenu(\'' + c.slug.replace(/'/g, "\\'") + '\', event)">';
    html += '<div class="camp-head">';
    html += '<div class="camp-title">' + escapeHtml(c.topic) + '</div>';
    html += '<span class="camp-meta">' + (c.profileBrand || '—') + ' · ' + c.goal + (c.blogMode ? ' · ' + c.blogMode : '') + '</span>';
    html += '</div>';
    if (c.keyMessage) {
      html += '<div class="camp-key">' + escapeHtml(c.keyMessage) + '</div>';
    }

    // 큰 채널 카드 그리드
    html += '<div class="ch-grid">';
    for (const [ch, d] of Object.entries(c.channelData || {})) {
      const status = d.status || 'pending';
      const emoji = CHANNEL_EMOJI[ch] || '📡';
      const name = CHANNEL_LABEL[ch] || ch;
      const statusText = STATUS_LABEL[status] || status;
      const action = STATUS_ACTION[status] || '클릭';
      html += '<div class="ch-card ' + status + '" onclick="openDrawer(\'' + encodeURIComponent(c.slug) + "', '" + ch + '\')">';
      html += '<div class="emoji">' + emoji + '</div>';
      html += '<div class="name">' + name + '</div>';
      html += '<div class="status-text"><span class="status-dot"></span>' + statusText + '</div>';
      html += '<div class="action">' + action + '</div>';
      html += '</div>';
    }
    html += '</div>'; // ch-grid

    html += '</div>'; // day-camp-card
  }

  // 페이지 하단 끝 마커 — 스크롤 끝까지 내려갔다는 시각 표시
  html += '<div style="height:1px; margin-top:60px; text-align:center; color:var(--text-mute); font-size:11px; padding:20px 0;">— 페이지 끝 —</div>';
  return html;
}

function renderCampaigns() {

  if (!list.length) {
    return '<div class="empty"><div class="empty-emoji">🗂</div>아직 캠페인 없음</div>';

  let html = '<div class="grid">';

    html += '<span class="card-meta">' + formatDate(c.updatedAt) + '</span>';
    html += '</div>';
    html += '<div class="card-meta" style="margin-bottom:10px;">';
    html += (c.profileBrand || '—') + ' · ' + c.goal;
    if (c.blogMode) html += ' · <span style="color:var(--accent-blue);">' + c.blogMode + '</span>';
    html += '</div>';
    if (c.keyMessage) {
      html += '<div style="font-size:12px; color:var(--text-dim); margin-bottom:10px; padding:8px 10px; background:var(--panel-2); border-radius:6px;">';
      html += escapeHtml(c.keyMessage.slice(0, 140));
      html += '</div>';
    }
    html += '<div class="pills">';
    for (const [ch, d] of Object.entries(c.channelData)) {
      // 캠페인 페이지에선 published URL 이 있으면 [↗] 별도 링크 + pill 자체는 drawer

      }
    }
    html += '</div>';
    html += '</div>';

  html += '</div>';
  return html;

function renderHistory() {
  const data = cache.history;
  if (!data) return '<div class="empty">⏳ 로딩…</div>';
  const events = data.events || [];

  if (!events.length) {
    return '<div class="empty"><div class="empty-emoji">📤</div>아직 발행된 글 없음</div>';
  }

  // Group by date
  const groups = {};
  for (const e of events) {
    const d = (e.publishedAt || '').slice(0, 10);
    if (!groups[d]) groups[d] = [];
    groups[d].push(e);
  }
  const dates = Object.keys(groups).sort().reverse();

  let html = '';
  for (const d of dates) {
    html += '<h2>' + d + '</h2>';
    html += '<div class="card" style="padding:0;">';
    for (const e of groups[d]) {
      html += '<div class="hist-row">';
      html += '<span class="hist-time">' + formatTime(e.publishedAt) + '</span>';
      html += channelTag(e.channel);
      html += '<span class="hist-topic">' + escapeHtml(e.slug) + '</span>';
      if (e.url) {
        html += '<a href="' + e.url + '" target="_blank" style="font-size:12px;">→ 보기</a>';
      }
      if (e.dryRun) {
        html += '<span class="pill pending">dry-run</span>';
      } else if (!e.ok) {
        html += '<span class="pill failed">실패</span>';
      } else {
        html += '<span class="pill published">발행</span>';
      }
      html += '</div>';
    }
    html += '</div>';
  }
  return html;
}

  // Map channel → auth status

  let html = '';

  // Chrome attach 상태 배너
  if (!chrome.ok) {
    html += '<div style="background:rgba(255,107,107,0.10); border-left:3px solid #ff6b6b; padding:14px 18px; border-radius:6px; margin-bottom:14px; font-size:13px;">';

    html += '<button onclick="startChrome9222()" id="btn-chrome-start" style="background:var(--accent); border:0; color:#0a0a0c; padding:9px 16px; border-radius:6px; cursor:pointer; font-size:13px; font-weight:600; white-space:nowrap;">🌐 Chrome 9222 켜기</button>';
    html += '</div>';
    html += '<div style="margin-top:8px; font-size:11px; opacity:0.7;">대시보드가 Chrome 을 OS 별 자동 경로 (Program Files / Applications) 에서 찾아 spawn 합니다. 기존 Chrome 인스턴스에 영향 X — <code>auth/chrome-attach-profile</code> 별도 프로필 사용.</div>';
    if (chrome.error) html += '<div style="margin-top:6px; opacity:0.7; font-family:monospace; font-size:11px;">' + escapeHtml(chrome.error) + '</div>';
    html += '</div>';
  } else {
    const checked = chrome.checkedAt ? new Date(chrome.checkedAt).toLocaleTimeString('ko-KR') : '';
    html += '<div style="background:rgba(96,255,150,0.08); border-left:3px solid #60ff96; padding:10px 14px; border-radius:6px; margin-bottom:14px; font-size:12px; display:flex; align-items:center; gap:10px;">';
    html += '<span>✅ Chrome attach 연결됨 (port 9222) — 쿠키 검사 완료 ' + checked + ' (5분 캐시)</span>';

    html += '</div>';
  }

  // 일괄 wizard 버튼
  const unconnected = ALL_CHANNELS.filter((ch) => !authMap[ch]?.configured);
  if (unconnected.length > 0 && chrome.ok) {
    html += '<div style="background:rgba(90,77,210,0.10); border-left:3px solid #7a8aff; padding:14px 18px; border-radius:6px; margin-bottom:14px; font-size:13px; display:flex; align-items:center; gap:14px;">';
    html += '<div>🧙 <strong>미연결 ' + unconnected.length + '개 일괄 진행</strong> — 한 번에 하나씩 Chrome 탭 열고 자동으로 연결 확인.</div>';
    html += '<button onclick="startLoginWizard()" style="margin-left:auto; background:#7a8aff; border:0; color:#fff; padding:9px 18px; border-radius:6px; cursor:pointer; font-size:13px; font-weight:600; white-space:nowrap;">📡 마법사 시작</button>';
    html += '</div>';
  }

  html += '<div style="background:rgba(122,138,255,0.08); border-left:3px solid var(--accent-blue); padding:14px 18px; border-radius:6px; margin-bottom:20px; font-size:13px;">';
  html += '💡 <strong>"연결" 버튼 클릭</strong> → Chrome 의 로그인 페이지 열림 → 1회 로그인하면 <code style="color:var(--accent);">auth/chrome-attach-profile/</code> 에 영구 캐시됩니다 (쿠키 삭제 X).';
  html += '</div>';

  html += '<div class="grid">';
  for (const ch of ALL_CHANNELS) {
    const a = authMap[ch];
    const connected = !!a?.configured;
    html += '<div class="card">';
    html += '<div class="card-row" style="margin-bottom:8px;">';
    html += '<div class="card-title">' + (CHANNEL_LABEL[ch] || ch) + '</div>';
    html += '<span class="pill ' + (connected ? 'published' : 'pending') + '">' + (connected ? '연결됨' : '미연결') + '</span>';
    html += '</div>';
    if (connected && a?.cookie) {
      const exp = a.expiresAt ? new Date(a.expiresAt).toLocaleDateString('ko-KR') + ' 까지' : '세션 쿠키';
      html += '<div class="card-meta" style="margin-bottom:8px; opacity:0.7;">🍪 ' + escapeHtml(a.cookie) + ' · ' + exp + '</div>';
    } else if (a?.hint) {
      html += '<div class="card-meta" style="margin-bottom:8px;">' + escapeHtml(a.hint) + '</div>';
    }
    html += '<button class="btn-connect" onclick="connectChannel(\'' + ch + '\')">';
    html += connected ? '🔁 다시 로그인' : '🔌 연결 (Chrome 로그인)';
    html += '</button>';
    html += '</div>';
  }
  html += '</div>';
  return html;
}

async function refreshChannels() {
  // 캐시 강제 비우고 즉시 재검사 (수동 로그인 후 바로 확인용)
  const btn = event?.target;
  if (btn) { btn.disabled = true; btn.textContent = '⏳ 검사 중…'; }
  try {
    const fresh = await fetch('/api/channels?fresh=1').then((r) => r.json());
    cache.channels = fresh;
    renderTab('channels');
  } catch (e) {
    alert('재검사 실패: ' + e.message);
  }
}

async function startChrome9222() {
  const btn = document.getElementById('btn-chrome-start');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Chrome 시작 중...'; }
  try {
    const r = await fetch('/api/chrome/start', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
    const data = await r.json();
    if (!r.ok || data.error) {
      let msg = data.error || ('HTTP ' + r.status);
      if (data.tried) msg += '\n\n시도한 경로:\n' + data.tried.join('\n');
      if (data.hint) msg += '\n\n' + data.hint;
      alert('Chrome 시작 실패:\n\n' + msg);
      if (btn) { btn.disabled = false; btn.textContent = '🌐 Chrome 9222 켜기'; }
      return;
    }
    if (data.alreadyAlive) {
      // 이미 살아 있었음 — 새로고침으로 마무리
      refreshChannels();
      return;
    }
    if (btn) btn.textContent = '✓ Chrome 시작됨 (' + (data.browser || 'OK') + ')';
    // cookie cache 새로 검사
    setTimeout(() => refreshChannels(), 800);
  } catch (e) {
    alert('Chrome 시작 실패: ' + e.message);
    if (btn) { btn.disabled = false; btn.textContent = '🌐 Chrome 9222 켜기'; }
  }
}

async function connectChannel(channel) {
  try {
    const r = await fetch('/api/channels/connect', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ channel }),
    });
    const data = await r.json();
    if (data.error) {
      alert('연결 실패: ' + data.error);
      return;
    }
    // Chrome 탭 떴음 — 자동 polling 으로 로그인 감지
    showLoginPollModal(channel);
  } catch (e) {
    alert('Chrome 9222 연결 실패: ' + e.message);
  }
}

// 단일 채널 로그인 polling 모달 — 사용자가 로그인하면 자동 감지
function showLoginPollModal(channel, opts = {}) {
  const label = CHANNEL_LABEL[channel] || channel;
  let modal = document.getElementById('login-poll-modal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'login-poll-modal';
    modal.style.cssText = 'position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:300; display:flex; align-items:center; justify-content:center;';
    document.body.appendChild(modal);
  }
  modal.innerHTML =
    '<div style="background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:28px 32px; width:min(520px, 94vw); box-shadow:0 20px 60px rgba(0,0,0,0.5);">' +
      '<div style="font-size:18px; font-weight:700; margin-bottom:8px;">🔌 ' + label + ' 연결 중</div>' +
      '<div style="font-size:13px; color:var(--text-dim); line-height:1.6; margin-bottom:18px;">' +
        '1. Chrome 새 탭에서 <strong>' + label + ' 로그인</strong> 진행<br>' +
        '2. "<strong>로그인 유지</strong>" 체크박스 확인 (있다면)<br>' +
        '3. 로그인 완료되면 이 모달이 자동으로 ✅ 표시' +
      '</div>' +
      '<div id="poll-status" style="background:var(--panel-2); border:1px solid var(--border); border-radius:8px; padding:14px 16px; margin-bottom:14px; font-size:13px;">' +
        '<span class="spin" style="display:inline-block; animation:spin 1s linear infinite;">⏳</span> 쿠키 검사 중...' +
      '</div>' +
      '<div style="display:flex; gap:10px;">' +
        '<button onclick="cancelLoginPoll()" style="flex:1; background:transparent; border:1px solid var(--border); color:var(--text-dim); padding:10px; border-radius:6px; cursor:pointer;">취소</button>' +
        (opts.next ? '<button id="poll-skip" onclick="loginWizardSkip()" style="flex:1; background:var(--panel-2); border:1px solid var(--border); color:var(--text); padding:10px; border-radius:6px; cursor:pointer;">⏭ 건너뛰기</button>' : '') +
      '</div>' +
    '</div>';
  modal.style.display = 'flex';

  // polling — 5초마다 /api/channels/login-status
  if (window._loginPoll) clearInterval(window._loginPoll);
  let tries = 0;
  const MAX_TRIES = 60;  // 5초 x 60 = 5분
  const poll = async () => {
    tries++;
    if (tries > MAX_TRIES) {
      clearInterval(window._loginPoll);
      const s = document.getElementById('poll-status');
      if (s) s.innerHTML = '⌛ 시간 초과 — 로그인 안 되었습니다. 모달 닫고 다시 시도.';
      return;
    }
    try {
      const r = await fetch('/api/channels/login-status?channel=' + encodeURIComponent(channel));
      const data = await r.json();
      if (data.connected) {
        clearInterval(window._loginPoll);
        const s = document.getElementById('poll-status');
        if (s) s.innerHTML = '✅ <strong>연결됨!</strong> 쿠키 감지: ' + escapeHtml(data.info?.cookie || '?');
        // 1.5초 후 자동 닫기 + 다음 단계
        setTimeout(() => {
          modal.style.display = 'none';
          if (opts.next) opts.next();
          else refreshChannels();
        }, 1500);
      }
    } catch {}
  };
  poll();
  window._loginPoll = setInterval(poll, 5000);
}

function cancelLoginPoll() {
  if (window._loginPoll) clearInterval(window._loginPoll);
  document.getElementById('login-poll-modal').style.display = 'none';
}

// 🧙 일괄 로그인 마법사
let _wizardQueue = [];
function startLoginWizard() {
  const auth = cache.channels?.auth || [];
  const authMap = Object.fromEntries(auth.map((a) => [a.channel, a]));
  _wizardQueue = ALL_CHANNELS.filter((ch) => !authMap[ch]?.configured);
  if (!_wizardQueue.length) {
    alert('전부 연결됨!');
    return;
  }
  loginWizardNext();
}

async function loginWizardNext() {
  if (!_wizardQueue.length) {
    if (window._loginPoll) clearInterval(window._loginPoll);
    const m = document.getElementById('login-poll-modal');
    if (m) m.style.display = 'none';
    alert('🎉 마법사 완료! 모든 채널 진행 끝.');
    refreshChannels();
    return;
  }
  const ch = _wizardQueue.shift();
  try {
    await fetch('/api/channels/connect', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ channel: ch }),
    });
    showLoginPollModal(ch, { next: loginWizardNext });
  } catch (e) {
    alert('Chrome 연결 실패 (' + ch + '): ' + e.message);
  }
}

function loginWizardSkip() {
  if (window._loginPoll) clearInterval(window._loginPoll);
  loginWizardNext();
}

    document.getElementById('nc-content').value = opts.prefilledMd;
  }

    document.getElementById('nc-source-name').value = opts.sourceName;
  }
  // 파일 type 변경 시 file input 토글
  document.querySelectorAll('input[name="nc-type"]').forEach((el) => {
    el.onchange = () => {
      const t = document.querySelector('input[name="nc-type"]:checked').value;
      document.getElementById('nc-file').style.display = (t === 'file') ? 'block' : 'none';
      const ta = document.getElementById('nc-content');
      if (t === 'url') ta.placeholder = 'https://... — URL 한 줄 입력';
      else if (t === 'md') ta.placeholder = 'md 텍스트 붙여넣기...';
      else ta.placeholder = '위 파일 업로드 후 자동 채워짐';
    };
  });
  document.getElementById('nc-file').onchange = async (e) => {
    const f = e.target.files[0];
    if (!f) return;
    if (!document.getElementById('nc-source-name').value) {
      document.getElementById('nc-source-name').value = f.name;
    }
    // PDF 면 base64 인코딩 + type='pdf' 로 강제 변경
    if (/\.pdf$/i.test(f.name) || f.type === 'application/pdf') {
      const buf = await f.arrayBuffer();
      // ArrayBuffer → base64 (chunked, 큰 파일 대비)
      const bytes = new Uint8Array(buf);
      let bin = '';
      const CHUNK = 0x8000;
      for (let i = 0; i < bytes.length; i += CHUNK) {
        bin += String.fromCharCode.apply(null, bytes.subarray(i, i + CHUNK));
      }
      const b64 = btoa(bin);
      document.getElementById('nc-content').value = `[PDF binary ${(f.size/1024).toFixed(1)} KB · base64 ${b64.length.toLocaleString()} 자]`;
      // pdf radio 가 없으니 hidden flag 로 저장
      window._ncPdfBase64 = b64;
      // type radio 변경 — 'file' 유지하되 [분석] 시 PDF 로 분기
      const ta = document.getElementById('nc-content');
      ta.placeholder = 'PDF 로드됨 — [🔍 분석] 클릭하면 파싱 시작';
      ta.disabled = true;
    } else {
      window._ncPdfBase64 = null;
      const text = await f.text();
      document.getElementById('nc-content').value = text;
      document.getElementById('nc-content').disabled = false;
    }
  };
}

let _ncParsed = null;

async function parseCampaignSource() {
  let type = document.querySelector('input[name="nc-type"]:checked').value;
  let content = document.getElementById('nc-content').value.trim();
  const sourceName = document.getElementById('nc-source-name').value.trim();

  // PDF 모드 — base64 buffer 우선
  if (window._ncPdfBase64) {
    type = 'pdf';
    content = window._ncPdfBase64;
  }

  if (!content) { alert('자료 입력 필요'); return; }
  const status = document.getElementById('nc-parse-status');
  status.textContent = '분석 중... (PDF 는 페이지 수에 따라 10-60초 소요)';
  try {
    const r = await fetch('/api/source/parse', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type, content, sourceName }),
    });
    const data = await r.json();
    if (!r.ok || data.error) throw new Error(data.error || ('HTTP ' + r.status));
    _ncParsed = data.parsed;
    status.textContent = '분석 완료 · 저장: ' + data.savedSrcPath;
    renderNcPreview(data.parsed);
    document.getElementById('nc-config').style.display = 'block';
    document.getElementById('nc-actions').style.display = 'flex';
    // tonePreset 자동 선택
    if (data.parsed.tonePreset) {
      document.getElementById('nc-tone').value = data.parsed.tonePreset;
    }
  } catch (e) {
    status.textContent = '실패: ' + e.message;
    _ncParsed = null;
  }
}

async function createCampaign() {
  if (!_ncParsed) { alert('먼저 [🔍 분석] 클릭'); return; }
  const channels = [...document.querySelectorAll('.nc-channel:checked')].map((el) => el.value);

  const goal = document.getElementById('nc-goal').value;
  const status = document.getElementById('nc-create-status');
  status.textContent = '생성 중...';
  try {
    const r = await fetch('/api/campaign/create', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ parsed: _ncParsed, channels, tonePreset: tonePreset || undefined, goal }),
    });

  }
}

let _envLoaded = false;
async function loadEnvOnce() {
  if (_envLoaded) return;
  _envLoaded = true;
  try {
    const r = await fetch('/api/env');
    const data = await r.json();
    const root = document.getElementById('env-current');
    if (!root) return;
    if (!data.exists) {
      root.innerHTML = '<div style="color:var(--danger)">.env.local 파일 없음 — 아래 값 입력 후 저장하면 자동 생성됩니다</div>';
      return;
    }
    const fal = data.keys?.FAL_KEY;
    const eng = data.keys?.CONTENT_ENGINE_PROVIDER;
    const mdl = data.keys?.FAL_IMAGE_MODEL;
    const statusOf = (k) => !k ? 'missing' : (k.is_placeholder ? 'placeholder' : 'set');
    const badge = (s) => {
      const cls = s === 'set' ? 'published' : (s === 'missing' ? 'failed' : 'preview');
      const txt = s === 'set' ? '설정됨' : (s === 'missing' ? '없음' : 'placeholder');
      return '<span class="pill ' + cls + '">' + txt + '</span>';
    };
    let html = '<div class="grid">';
    html += '<div class="card"><div class="card-row" style="margin-bottom:6px;"><div class="card-title">FAL_KEY</div>' + badge(statusOf(fal)) + '</div>';
    html += '<div class="card-meta">' + (fal?.value || '—') + '</div></div>';
    html += '<div class="card"><div class="card-row" style="margin-bottom:6px;"><div class="card-title">CONTENT_ENGINE_PROVIDER</div>' + badge(statusOf(eng)) + '</div>';
    html += '<div class="card-meta">' + (eng?.value || '—') + '</div></div>';
    html += '<div class="card"><div class="card-row" style="margin-bottom:6px;"><div class="card-title">FAL_IMAGE_MODEL</div>' + badge(statusOf(mdl)) + '</div>';
    html += '<div class="card-meta">' + (mdl?.value || '—') + '</div></div>';
    html += '</div>';
    root.innerHTML = html;
  } catch (e) {
    document.getElementById('env-current').innerHTML = '<div style="color:var(--danger)">로드 실패: ' + e.message + '</div>';
  }
}

  status.textContent = '저장 중...';
  try {

function escapeHtml(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function toggleEditor(open) {
  const renderEl = document.getElementById('preview-render');
  const editEl = document.getElementById('editor-wrap');
  if (!renderEl || !editEl) return;
  if (open) {
    renderEl.style.display = 'none';
    editEl.style.display = 'block';
    const ta = document.getElementById('editor-textarea');
    if (ta) {
      ta.focus();
      // 글자 수 카운트
      ta.oninput = () => {
        const info = document.getElementById('editor-info');
        if (info) info.textContent = ta.value.length.toLocaleString() + '자';
      };
    }
  } else {
    // 변경사항이 있으면 컨펌
    const ta = document.getElementById('editor-textarea');
    if (ta && window.__lastDraft && ta.value !== (window.__lastDraft.text || '')) {
      if (!confirm('편집 내용을 버리시겠습니까?')) return;
    }
    editEl.style.display = 'none';
    renderEl.style.display = 'block';
  }
}

async function saveDraft(thenPublish) {
  if (!DRAWER_STATE.slug || !DRAWER_STATE.channel) return;
  const ta = document.getElementById('editor-textarea');
  if (!ta) return;
  const text = ta.value;
  // 저장 버튼 lock
  const buttons = document.querySelectorAll('.editor-actions button');
  buttons.forEach((b) => b.disabled = true);
  try {
    const r = await fetch('/api/draft', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        slug: DRAWER_STATE.slug,
        channel: DRAWER_STATE.channel,
        text,
      }),
    });
    const data = await r.json();
    if (!r.ok || data.error) throw new Error(data.error || ('HTTP ' + r.status));
    showToast('💾 저장 완료 (' + data.textLength.toLocaleString() + '자, 백업: ' + data.backup + ')');
    // 캐시 갱신 — 미리뷰 새로 그리기
    if (window.__lastDraft) window.__lastDraft.text = text;
    const renderEl = document.getElementById('preview-render');
    if (renderEl) renderEl.innerHTML = renderMd(text);
    if (thenPublish) {
      // 편집 영역 닫고 발행 시작
      document.getElementById('editor-wrap').style.display = 'none';
      renderEl.style.display = 'block';
      // 약간의 딜레이 후 발행 — toast 보일 시간
      setTimeout(() => startPublish(), 500);
    } else {
      toggleEditor(false);
    }
  } catch (e) {
    alert('저장 실패: ' + e.message);
  } finally {
    buttons.forEach((b) => b.disabled = false);
  }
}

function showToast(msg, kind) {
  const existing = document.querySelector('.save-toast');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.className = 'save-toast';
  if (kind === 'fail') el.style.background = 'var(--danger)';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2800);
}

// ─── Mini markdown render (preview only, not for publish) ──────
function renderMd(md) {
  if (!md) return '<div class="empty">본문 없음</div>';
  // strip front-matter
  md = md.replace(/^---[\s\S]*?---\n+/, '');
  const lines = md.split(/\r?\n/);
  const out = [];
  let para = [];
  let inUl = false;

  function flushPara() {
    if (para.length) {
      const text = para.join(' ').trim();
      if (text) out.push('<p>' + inline(escapeHtml(text)) + '</p>');
      para = [];
    }
  }
  function flushUl() {
    if (inUl) { out.push('</ul>'); inUl = false; }
  }
  function inline(s) {
    return s
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/`([^`]+)`/g, '<code>$1</code>');
  }

  for (const raw of lines) {
    const line = raw.trimEnd();
    const imgMatch = line.match(/^!\[([^\]]*)\]\((IMAGE_PLACEHOLDER_\d+|[^)]+)\)/);
    if (imgMatch) {
      flushPara(); flushUl();
      out.push('<div class="img-marker">🖼 ' + escapeHtml(imgMatch[2]) + (imgMatch[1] ? ' — ' + escapeHtml(imgMatch[1]) : '') + '</div>');
      continue;
    }
    if (/^##\s+/.test(line)) {
      flushPara(); flushUl();
      out.push('<h2>' + escapeHtml(line.replace(/^##\s+/, '')) + '</h2>');
      continue;
    }
    if (/^###\s+/.test(line)) {
      flushPara(); flushUl();
      out.push('<h3>' + escapeHtml(line.replace(/^###\s+/, '')) + '</h3>');
      continue;
    }
    if (/^>\s+/.test(line)) {
      flushPara(); flushUl();
      out.push('<blockquote>' + escapeHtml(line.replace(/^>\s+/, '')) + '</blockquote>');
      continue;
    }
    if (/^[-*]\s+/.test(line)) {
      flushPara();
      if (!inUl) { out.push('<ul>'); inUl = true; }
      out.push('<li>' + inline(escapeHtml(line.replace(/^[-*]\s+/, ''))) + '</li>');
      continue;
    }
    if (line === '') {
      flushPara(); flushUl();
      continue;
    }
    para.push(line);
  }
  flushPara(); flushUl();
  return out.join('\n');
}

// ─── Publish Drawer ────────────────────────────────────────────
let DRAWER_STATE = { slug: null, channel: null, jobId: null, evt: null };

async function openDrawer(slugEnc, channel) {
  const slug = decodeURIComponent(slugEnc);
  DRAWER_STATE = { slug, channel, jobId: null, evt: null };
  document.getElementById('drawer-mask').classList.add('open');
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-channel').textContent = (CHANNEL_LABEL[channel] || channel);
  document.getElementById('drawer-topic').textContent = '⏳ 로딩…';
  document.getElementById('drawer-body').innerHTML = '<div class="empty">⏳ draft 불러오는 중…</div>';
  // reset publish UI
  setPublishButtonMode(true);
  document.getElementById('btn-publish').disabled = false;

  try {
    const r = await fetch('/api/draft?slug=' + encodeURIComponent(slug) + '&channel=' + encodeURIComponent(channel));
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    renderDrawer(data);
  } catch (e) {
    document.getElementById('drawer-body').innerHTML = '<div class="pub-banner fail">로딩 실패: ' + escapeHtml(e.message) + '</div>';
  }
}

function closeDrawer() {
  // 편집 중이고 미저장 변경이 있으면 컨펌
  const ta = document.getElementById('editor-textarea');
  const editorOpen = document.getElementById('editor-wrap')?.style.display === 'block';
  if (editorOpen && ta && window.__lastDraft && ta.value !== (window.__lastDraft.text || '')) {
    if (!confirm('편집 중인 내용이 있습니다. 저장 안 하고 닫을까요?')) return;
  }
  // SSE 정리
  if (DRAWER_STATE.evt) {
    try { DRAWER_STATE.evt.close(); } catch {}
    DRAWER_STATE.evt = null;
  }
  document.getElementById('drawer-mask').classList.remove('open');
  const dr = document.getElementById('drawer');
  dr.classList.remove('open');
  dr.classList.remove('publishing');
}

// ─── 발행 비주얼 보드 ──────────────────────────────────────────
let PB_STATE = null; // { steps:Map<i, {label, status}>, totalSteps, currentStep, imageQ, imagePDone }

function pbInit(opts) {
  // opts: { channel, topic, dryRun, totalImages }
  PB_STATE = {
    channel: opts.channel,
    topic: opts.topic || '',
    dryRun: !!opts.dryRun,
    totalSteps: 0,        // 첫 step 라인 들어올 때 결정됨
    currentStep: 0,
    steps: new Map(),     // i → { label, status: 'done' | 'active' | 'failed' }
    imageQ: opts.totalImages || 0,
    imageDone: 0,
    imageActive: -1,
    nowText: '시작 중…',
    nowState: 'active',   // 'active' | 'done' | 'failed'
  };
}

function pbHandleLine(stamped) {
  if (!PB_STATE) return;
  // step 라인이면 currentStep 갱신
  if (stamped.step) {
    const { i, n, label } = stamped.step;
    if (PB_STATE.totalSteps !== n) PB_STATE.totalSteps = n;
    // 이전 active step 들 done 처리
    for (const [k, v] of PB_STATE.steps.entries()) {
      if (v.status === 'active' && k < i) v.status = 'done';
    }
    PB_STATE.steps.set(i, { label, status: 'active' });
    PB_STATE.currentStep = i;
    PB_STATE.nowText = label;
    PB_STATE.nowState = 'active';
  }
  // 이미지 진행
  if (stamped.imageProgress) {
    PB_STATE.imageDone = stamped.imageProgress.p;
    if (stamped.imageProgress.q) PB_STATE.imageQ = Math.max(PB_STATE.imageQ, stamped.imageProgress.q);
    PB_STATE.imageActive = stamped.imageProgress.p; // 다음에 업로드할 idx
  }
  // err 아이콘 → 현재 step 실패 표시 (failed 종료에서 다시 갱신)
  if (stamped.icon === 'err') {
    if (PB_STATE.steps.has(PB_STATE.currentStep)) {
      // 일단은 active 유지. 최종 done 이벤트에서 결정.
    }
  }
  pbRender();
}

function pbFinalize(status, finalEvt) {
  if (!PB_STATE) return;
  // 마지막 step 종료 처리
  for (const [k, v] of PB_STATE.steps.entries()) {
    if (v.status === 'active') {
      v.status = status === 'done' ? 'done' : 'failed';
    }
  }
  PB_STATE.nowState = status === 'done' ? 'done' : 'failed';
  if (status === 'done') {
    if (finalEvt?.result?.dryRun) PB_STATE.nowText = '🟡 dry-run 통과 — 실제 발행 X';
    else if (finalEvt?.result?.url) PB_STATE.nowText = '✅ 발행 완료';
    else PB_STATE.nowText = '✅ 작업 종료';
    // 모든 step done 처리
    for (let i = 1; i <= PB_STATE.totalSteps; i++) {
      const s = PB_STATE.steps.get(i);
      if (s && s.status !== 'failed') s.status = 'done';
    }
    if (PB_STATE.imageQ) PB_STATE.imageDone = PB_STATE.imageQ;
  } else {
    PB_STATE.nowText = '❌ 발행 실패 — 상세 로그 확인';
  }
  pbRender();
}

function pbRender() {
  if (!PB_STATE) return;
  const root = document.getElementById('pb-board');
  if (!root) return;

  const pct = PB_STATE.totalSteps
    ? Math.round((PB_STATE.currentStep / PB_STATE.totalSteps) * 100)
    : (PB_STATE.nowState === 'done' ? 100 : (PB_STATE.nowState === 'failed' ? 0 : 5));
  const barCls = PB_STATE.nowState === 'failed' ? 'failed'
    : (PB_STATE.nowState === 'done' ? 'done'
    : (PB_STATE.dryRun ? 'dry' : ''));
  const heroCls = PB_STATE.nowState === 'failed' ? 'failed'
    : (PB_STATE.nowState === 'done' ? 'done'
    : (PB_STATE.dryRun ? 'dry' : ''));
  const badgeCls = PB_STATE.dryRun ? 'dry' : 'live';
  const badgeText = PB_STATE.dryRun ? 'dry-run' : 'LIVE';

  let html = '';

  // ── HERO: 채널 + 배지 + 진행률 + 진행바 + "지금" ──
  html += '<div class="pb-hero ' + heroCls + '">';
  html += '<div class="pb-hero-head">';
  html += '<span class="ch">' + (CHANNEL_LABEL[PB_STATE.channel] || PB_STATE.channel) + '</span>';
  html += '<span class="badge ' + badgeCls + '">' + badgeText + '</span>';
  html += '<span class="topic" title="' + escapeHtml(PB_STATE.topic) + '">' + escapeHtml(PB_STATE.topic) + '</span>';
  html += '</div>';

  // 큰 진행률 + 큰 % + 큰 진행바
  html += '<div class="pb-progress-row">';
  if (PB_STATE.totalSteps) {
    html += '<div class="step-count">' + PB_STATE.currentStep + '<span class="total"> / ' + PB_STATE.totalSteps + '</span></div>';
    html += '<div class="step-label">단계</div>';
  } else {
    html += '<div class="step-label" style="font-size:18px;">시작 중…</div>';
  }
  html += '<div class="pct-big">' + pct + '%</div>';
  html += '</div>';
  html += '<div class="pb-bar-wrap"><div class="pb-bar ' + barCls + '" style="width:' + pct + '%"></div></div>';

  // 큰 "지금" 박스
  html += '<div class="pb-now ' + PB_STATE.nowState + '">';
  if (PB_STATE.nowState === 'active') html += '<span class="spinner"></span>';
  else if (PB_STATE.nowState === 'done') html += '<span class="icon-big">✅</span>';
  else html += '<span class="icon-big">❌</span>';
  html += '<div style="flex:1; min-width:0;">';
  html += '<div class="label">' + escapeHtml(PB_STATE.nowText) + '</div>';
  if (PB_STATE.nowState === 'active') {
    html += '<div class="sub">에이전트가 Chrome 에서 실시간으로 작업 중입니다 · jobId ' + (DRAWER_STATE.jobId || '').slice(0, 8) + '…</div>';
  }
  html += '</div>';
  html += '</div>';
  html += '</div>'; // pb-hero

  // ── 결과 banner (완료/실패 시 hero 바로 아래 큰 배너) ──
  if (PB_STATE.nowState === 'done' && PB_STATE.publishedUrl) {
    html += '<div class="pb-banner-big ok">';
    html += '<span class="ic">🎉</span>';
    html += '<div class="txt"><strong>발행 완료!</strong>';
    html += '<a href="' + PB_STATE.publishedUrl + '" target="_blank">' + escapeHtml(PB_STATE.publishedUrl) + '</a>';
    html += '</div></div>';
  } else if (PB_STATE.nowState === 'done' && PB_STATE.dryRun) {
    html += '<div class="pb-banner-big dry">';
    html += '<span class="ic">🟡</span>';
    html += '<div class="txt"><strong>dry-run 통과</strong>';
    html += '실제 발행은 일어나지 않았습니다. 위 토글을 끄고 다시 실행하면 LIVE 모드로 발행됩니다.';
    html += '</div></div>';
  } else if (PB_STATE.nowState === 'failed') {
    html += '<div class="pb-banner-big fail">';
    html += '<span class="ic">❌</span>';
    html += '<div class="txt"><strong>발행 실패</strong>';
    html += '아래 상세 로그를 확인하세요. Chrome 이 9222 포트로 실행 중인지, 채널 로그인 상태인지 점검 필요.';
    html += '</div></div>';
  }

  // ── 단계 그리드 (totalSteps 알려진 후) ──
  if (PB_STATE.totalSteps) {
    html += '<h3 class="pb-section-title">단계</h3>';
    html += '<div class="pb-steps">';
    for (let i = 1; i <= PB_STATE.totalSteps; i++) {
      const s = PB_STATE.steps.get(i);
      const status = s?.status || 'pending';
      const label = s?.label || '(대기 중)';
      let icon = i;
      if (status === 'done') icon = '✓';
      else if (status === 'failed') icon = '✗';
      html += '<div class="pb-step ' + status + '">';
      html += '<span class="ic">' + icon + '</span>';
      html += '<span class="lab">' + escapeHtml(label) + '</span>';
      html += '</div>';
    }
    html += '</div>';
  }

  // ── 이미지 그리드 (큼직, 번호 표시) ──
  if (PB_STATE.imageQ) {
    html += '<div class="pb-imgs-card">';
    html += '<div class="pb-imgs-head">';
    html += '<span class="title">📸 이미지 업로드</span>';
    html += '<span class="count-big">' + PB_STATE.imageDone + '<span class="total"> / ' + PB_STATE.imageQ + '</span></span>';
    html += '</div>';
    html += '<div class="pb-imgs">';
    for (let i = 0; i < PB_STATE.imageQ; i++) {
      let cls = '';
      if (i < PB_STATE.imageDone) cls = 'done';
      else if (i === PB_STATE.imageActive && PB_STATE.nowState === 'active') cls = 'uploading';
      html += '<div class="pb-img-cell ' + cls + '"><span class="num">' + (i + 1) + '</span></div>';
    }
    html += '</div></div>';
  }

  // ── 상세 로그 collapse ──
  html += '<button class="pb-collapse" onclick="toggleLogPanel()" id="pb-collapse-btn">';
  html += '<span class="arr">▶</span> 상세 로그 (' + (DRAWER_STATE.logLines || 0) + '줄) — 펼쳐서 raw 출력 확인';
  html += '</button>';
  html += '<div id="log-stream" class="log-stream" style="display:none; margin-top:10px;"></div>';

  root.innerHTML = html;
}

function toggleLogPanel() {
  const el = document.getElementById('log-stream');
  const btn = document.getElementById('pb-collapse-btn');
  if (!el) return;
  const open = el.style.display !== 'none';
  el.style.display = open ? 'none' : 'block';
  btn.classList.toggle('open', !open);
  if (!open) el.scrollTop = el.scrollHeight;
}

async function startPublish() {
  if (!DRAWER_STATE.slug || !DRAWER_STATE.channel) return;
  const dryRun = document.getElementById('dry-toggle').checked;

  if (!dryRun) {
    const ok = confirm('⚠️ 실제 발행합니다.\n\n채널: ' + (CHANNEL_LABEL[DRAWER_STATE.channel] || DRAWER_STATE.channel) + '\n\n흐름:\n1. 명령 복사 모달이 뜸\n2. Claude Code 채팅창에 붙여넣기\n3. 대시보드는 publish.log 라이브 모니터링\n\n진행할까요?');
    if (!ok) return;
  }

  const btn = document.getElementById('btn-publish');
  btn.disabled = true;
  btn.textContent = '⏳ 명령 준비 중…';

  // drawer 더 넓게
  document.getElementById('drawer').classList.add('publishing');

  try {
    // publish.log 초기화 + 명령어 받기
    const r = await fetch('/api/watch/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        slug: DRAWER_STATE.slug,
        channel: DRAWER_STATE.channel,
        dryRun,
      }),
    });
    const data = await r.json();
    if (!r.ok || data.error) throw new Error(data.error || ('HTTP ' + r.status));

    // 1. 명령 복사 모달 띄우기 + 자동 클립보드 복사
    showRunCommandModal(data.message, data.command);

    // 2. 모니터 영역 준비 + watch SSE 연결
    const logArea = document.getElementById('drawer-log-area');
    logArea.innerHTML =
      '<div id="watch-hero" class="watch-hero">' +
        '<div class="icon">📡</div>' +
        '<div class="info">' +
          '<div class="title">라이브 모니터 — ' + (CHANNEL_LABEL[DRAWER_STATE.channel] || DRAWER_STATE.channel) + (dryRun ? ' (dry-run)' : ' (LIVE)') + '</div>' +
          '<div class="meta">' +
            '<span>📁 publish.log 워치 중</span>' +
            '<span style="opacity:0.7;">Claude Code 채팅창에서 명령을 실행하면 여기로 흘러들어옵니다</span>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div id="pb-board" style="margin-top:8px;"></div>';

    // PB_STATE 초기화 (기존 hero 보드 재활용)
    pbInit({
      channel: DRAWER_STATE.channel,
      topic: window.__lastDraft?.topic || DRAWER_STATE.slug,
      dryRun,
      totalImages: window.__lastDraft?.images?.length || 0,
    });
    DRAWER_STATE.logLines = 0;
    pbRender();

    // file watch SSE
    connectWatchSSE(DRAWER_STATE.slug, DRAWER_STATE.channel, dryRun);

    // 보드까지 부드럽게 스크롤
    setTimeout(() => {
      const hero = document.getElementById('watch-hero');
      if (hero) hero.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);
  } catch (e) {
    alert('시작 실패: ' + e.message);
    btn.disabled = false;
    setPublishButtonMode(document.getElementById('dry-toggle').checked);
  }
}

    pbInit({
      channel: DRAWER_STATE.channel,
      topic: window.__lastDraft?.topic || DRAWER_STATE.slug,
      dryRun,
      totalImages: window.__lastDraft?.images?.length || 0,
    });
    DRAWER_STATE.logLines = 0;
    pbRender();

    connectWatchSSE(DRAWER_STATE.slug, DRAWER_STATE.channel, dryRun);

    setTimeout(() => {
      const hero = document.getElementById('watch-hero');
      if (hero) hero.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);

    btn.textContent = '⚡ 즉시';
    btn.disabled = false;
  } catch (e) {
    alert('백엔드 spawn 실패: ' + e.message + '\n\nChrome 9222 모드로 실행됐는지 확인.');
    btn.disabled = false;
    btn.textContent = '⚡ 즉시';
  }
}

function appendLog(stamped) {
  // 상세 로그 영역에 한 줄 추가 (PB 보드 의 collapsible 로그용)
  const el = document.getElementById('log-stream');
  if (!el) return;
  const ln = document.createElement('span');
  let kind = stamped.stream === 'stderr' ? 'stderr' : '';
  if (stamped.icon === 'err') kind = 'stderr';
  ln.className = 'ln' + (kind ? ' ' + kind : '');
  ln.textContent = stamped.line;
  el.appendChild(ln);
  el.scrollTop = el.scrollHeight;
  DRAWER_STATE.logLines = (DRAWER_STATE.logLines || 0) + 1;
  // collapse 버튼 카운트 업데이트
  const btn = document.getElementById('pb-collapse-btn');
  if (btn) {
    btn.innerHTML = '<span class="arr ' + (btn.classList.contains('open') ? 'open' : '') + '">▶</span> 상세 로그 (' + DRAWER_STATE.logLines + '줄)';

}

// ─── 📂 파일 워치 SSE — publish.log 라인 → 기존 PB 보드 갱신 ──
function connectWatchSSE(slug, channel, dryRun) {
  if (DRAWER_STATE.evt) { try { DRAWER_STATE.evt.close(); } catch {} }
  const evt = new EventSource('/api/watch?slug=' + encodeURIComponent(slug) + '&channel=' + encodeURIComponent(channel));
  DRAWER_STATE.evt = evt;

  evt.addEventListener('log', (e) => {
    try {
      const stamped = JSON.parse(e.data);
      pbHandleLine(stamped);   // 비주얼 보드 갱신
      appendLog(stamped);      // 상세 로그 collapsible 에 raw 라인 추가
    } catch {}
  });

  evt.addEventListener('result', (e) => {
    try {
      const { result } = JSON.parse(e.data);
      if (!result) return;
      // result.json 갱신 — 발행 끝남
      if (result.url && !result.dryRun) PB_STATE.publishedUrl = result.url;
      pbFinalize(result.ok ? 'done' : 'failed', { result });

      // 1.5초 후 캠페인 데이터 새로고침
      setTimeout(loadAll, 1500);

      // 발행 버튼 활성화
      const btn = document.getElementById('btn-publish');
      if (btn) {
        btn.disabled = false;
        setPublishButtonMode(document.getElementById('dry-toggle').checked);
      }
    } catch {}
  });

  evt.onerror = () => {
    // EventSource 자동 재연결
  };
}

// 어디든 md/PDF 파일 떨어뜨리면 새 캠페인 모달 자동 오픈 + 파일 prefill
(function setupGlobalDropzone() {
  let dragCounter = 0;
  let overlay = null;

  function ensureOverlay() {
    if (overlay) return overlay;
    overlay = document.createElement('div');
    overlay.id = 'global-drop-overlay';
    overlay.style.cssText = 'position:fixed; inset:0; background:rgba(80,200,120,0.10); border:4px dashed var(--accent); z-index:500; display:none; align-items:center; justify-content:center; pointer-events:none; backdrop-filter:blur(2px);';
    overlay.innerHTML = '<div style="background:var(--panel); border:1px solid var(--accent); border-radius:14px; padding:32px 40px; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,0.5);"><div style="font-size:48px; margin-bottom:12px;">📥</div><div style="font-size:20px; font-weight:700; color:var(--text); margin-bottom:6px;">자료 드롭 → 새 캠페인</div><div style="font-size:13px; color:var(--text-dim);">md · markdown · txt · pdf 지원</div></div>';
    document.body.appendChild(overlay);
    return overlay;
  }

  window.addEventListener('dragenter', (e) => {
    if (!e.dataTransfer?.types?.includes('Files')) return;
    dragCounter++;
    ensureOverlay().style.display = 'flex';
  });

  window.addEventListener('dragleave', (e) => {
    dragCounter--;
    if (dragCounter <= 0) {
      dragCounter = 0;
      if (overlay) overlay.style.display = 'none';
    }
  });

  window.addEventListener('dragover', (e) => {
    if (e.dataTransfer?.types?.includes('Files')) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'copy';
    }
  });

  window.addEventListener('drop', async (e) => {
    if (!e.dataTransfer?.files?.length) return;
    e.preventDefault();
    dragCounter = 0;
    if (overlay) overlay.style.display = 'none';

    const file = e.dataTransfer.files[0];
    if (!/\.(md|markdown|txt|pdf)$/i.test(file.name)) {
      alert('지원하지 않는 파일 형식: ' + file.name + '\n\nmd · markdown · txt · pdf 만 지원');
      return;
    }

    // 새 캠페인 모달 열기
    openNewCampaign();

    // 짧은 지연 후 파일 input 에 setFiles (모달 DOM 완성 후)
    setTimeout(async () => {
      const fileInput = document.getElementById('nc-file');
      if (!fileInput) return;
      // DataTransfer 로 input 의 files 강제 설정 (브라우저 보안 우회)
      const dt = new DataTransfer();
      dt.items.add(file);
      fileInput.files = dt.files;
      // change 이벤트 트리거
      fileInput.dispatchEvent(new Event('change'));
      // type 라디오를 'file' 로 변경
      const fileRadio = document.querySelector('input[name="nc-type"][value="file"]');
      if (fileRadio) {
        fileRadio.checked = true;
        fileRadio.dispatchEvent(new Event('change'));
      }
    }, 200);
  });
})();

// ─── 콘텍스트 메뉴 (캠페인 카드 우클릭) ─────────────────────
(function setupContextMenu() {
  let menu = null;

  function ensureMenu() {
    if (menu) return menu;
    menu = document.createElement('div');
    menu.id = 'ctx-menu';
    menu.style.cssText = 'position:fixed; background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:6px; box-shadow:0 12px 40px rgba(0,0,0,0.4); z-index:400; display:none; min-width:180px;';
    document.body.appendChild(menu);
    document.addEventListener('click', () => { if (menu) menu.style.display = 'none'; });
    document.addEventListener('contextmenu', (e) => {
      // 한 번 더 우클릭이 메뉴 자체 위면 무시
      if (menu && menu.contains(e.target)) return;
    });
    return menu;
  }

  // 위치 잡기 (화면 밖으로 안 나가게)
  function positionMenu(m, x, y) {
    m.style.left = x + 'px';
    m.style.top = y + 'px';
    m.style.display = 'block';
    requestAnimationFrame(() => {
      const r = m.getBoundingClientRect();
      if (r.right > window.innerWidth - 8) m.style.left = (window.innerWidth - r.width - 8) + 'px';
      if (r.bottom > window.innerHeight - 8) m.style.top = (window.innerHeight - r.height - 8) + 'px';
    });
  }

  function renderItems(items) {
    return items.map((it) => {
      if (it === '---') return '<div style="height:1px; background:var(--border); margin:4px 0;"></div>';
      return `<div data-id="${it.id}" style="padding:8px 14px; cursor:pointer; font-size:13px; color:${it.danger ? '#ff6b6b' : 'var(--text)'}; border-radius:5px; user-select:none;" onmouseover="this.style.background='var(--panel-2)'" onmouseout="this.style.background='transparent'">${it.label}</div>`;
    }).join('');
  }

  // 캠페인 카드 우클릭
  window.showCampaignMenu = function(slug, ev) {
    ev.preventDefault();
    ev.stopPropagation();
    const m = ensureMenu();
    const items = [
      { id: 'open', label: '📅 캘린더에서 열기' },
      { id: 'duplicate', label: '📋 복제 (clipboard)' },
      '---',
      { id: 'copylink', label: '🔗 slug 복사' },
    ];
    m.innerHTML = renderItems(items);
    for (const el of m.querySelectorAll('[data-id]')) {
      el.onclick = async (e) => {
        e.stopPropagation();
        m.style.display = 'none';
        const id = el.dataset.id;
        if (id === 'open') {
          // 캘린더 탭 + 해당 slug 의 캠페인 강조
          document.querySelectorAll('.nav-item').forEach((n) => n.classList.remove('active'));
          document.querySelector('[data-tab="calendar"]')?.classList.add('active');
          renderTab('calendar');
        } else if (id === 'duplicate') {
          await navigator.clipboard.writeText(slug).catch(() => {});
          alert('slug 복사됨 (복제 endpoint 는 추후): ' + slug);
        } else if (id === 'copylink') {
          await navigator.clipboard.writeText(slug).catch(() => {});
        }
      };
    }
    positionMenu(m, ev.clientX, ev.clientY);
  };

  // 자료 카드 우클릭
  window.showSourceMenu = function(srcPath, ev) {
    ev.preventDefault();
    ev.stopPropagation();
    const m = ensureMenu();
    const items = [
      { id: 'reuse', label: '♻️ 이 자료로 새 캠페인' },
      { id: 'open', label: '📄 raw md 열기 (새 탭)' },
      '---',
      { id: 'copy', label: '🔗 경로 복사' },
    ];
    m.innerHTML = renderItems(items);
    for (const el of m.querySelectorAll('[data-id]')) {
      el.onclick = async (e) => {
        e.stopPropagation();
        m.style.display = 'none';
        const id = el.dataset.id;
        if (id === 'reuse') {
          reuseSource(encodeURIComponent(srcPath));
        } else if (id === 'open') {
          window.open('/' + srcPath, '_blank');
        } else if (id === 'copy') {
          await navigator.clipboard.writeText(srcPath).catch(() => {});
        }
      };
    }
    positionMenu(m, ev.clientX, ev.clientY);
  };
})();

// ─── 작업 미니맵 + 데스크탑 알림 ────────────────────────────
let _seenTaskKeys = new Set();
let _lastTaskRunningKeys = new Set();
let _notifAsked = false;

async function pollPublishTasks() {
  try {
    const r = await fetch('/api/publish/status');
    const data = await r.json();
    const tasks = data.tasks || {};
    const root = document.getElementById('task-minimap');
    const list = document.getElementById('task-minimap-list');
    if (!root || !list) return;

    const keys = Object.keys(tasks);
    const runningNow = new Set(keys.filter((k) => tasks[k]?.running));

    // 알림 — 직전 running 이었는데 지금 안 running 인 것 (= 끝남)
    for (const k of _lastTaskRunningKeys) {
      if (!runningNow.has(k)) {
        const t = tasks[k];
        if (!t) continue;
        const code = t.exitCode;
        const label = CHANNEL_LABEL[t.channel] || t.channel;
        const msg = code === 0 ? `✓ ${label} 발행 완료` : `✗ ${label} 발행 실패 (exit ${code})`;
        notifyDesktop(msg, { body: t.slug, tag: k });
      }
    }
    _lastTaskRunningKeys = runningNow;

    // 미니맵 — running 만 표시 (없으면 hide)
    if (runningNow.size === 0) {
      root.style.display = 'none';
      list.innerHTML = '';
      return;
    }
    root.style.display = 'block';
    let html = '';
    for (const k of runningNow) {
      const t = tasks[k];
      const label = CHANNEL_LABEL[t.channel] || t.channel;
      html += '<div style="background:var(--panel-2); border:1px solid var(--border); border-radius:6px; padding:8px 10px; margin-bottom:6px; font-size:12px;">';
      html += '<div style="display:flex; align-items:center; gap:6px; font-weight:600; margin-bottom:3px;">';
      html += '<span style="display:inline-block; width:8px; height:8px; background:var(--accent); border-radius:50%; animation:pulse 1.4s ease-in-out infinite;"></span>';
      html += escapeHtml(label) + (t.dryRun ? ' <span style="color:var(--accent-orange); font-size:10px;">DRY</span>' : '');
      html += '</div>';
      html += '<div style="color:var(--text-dim); font-size:10.5px; word-break:break-all;">' + escapeHtml(t.slug.slice(0, 40)) + '...</div>';
      html += '</div>';
    }
    list.innerHTML = html;
  } catch {}
}

function notifyDesktop(title, opts = {}) {
  // Notification API
  if (typeof Notification === 'undefined') return;
  if (Notification.permission === 'granted') {
    try { new Notification(title, opts); } catch {}
  }
  // 권한 요청 — 첫 발행 끝났을 때만 1회
  else if (Notification.permission === 'default' && !_notifAsked) {
    _notifAsked = true;
    Notification.requestPermission().then((p) => {
      if (p === 'granted') {
        try { new Notification(title, opts); } catch {}
      }
    });
  }
}

document.addEventListener('keydown', (e) => {
  // 입력 중이면 단축키 무시 (Esc 제외)
  const inField = /input|textarea/i.test(e.target.tagName) || e.target.isContentEditable;

  // Esc — 모달 닫기
  if (e.key === 'Escape') {
    const modals = ['new-campaign-modal', 'login-poll-modal', 'run-cmd-modal', 'ctx-menu', 'global-drop-overlay'];

      const el = document.getElementById(id);
      if (el && el.style.display !== 'none') {
        el.style.display = 'none';
        return;

    }
  }

  if (inField) return;

  // Ctrl+N — 새 캠페인
  if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
    e.preventDefault();
    openNewCampaign();
  }
  // Ctrl+R — 새로고침 (override 안 함 — 브라우저 그대로)
});
