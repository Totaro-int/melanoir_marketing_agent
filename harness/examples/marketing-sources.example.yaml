# marketing-sources.example.yaml
# 사용법: 이 파일을 프로젝트 루트의 marketing-sources.yaml 로 복사하고 편집.
# (gitignored — 사용자별 설정)
#
#   cp harness/examples/marketing-sources.example.yaml marketing-sources.yaml
#   # 편집 후
#   node harness/bin/source-collect.mjs
#
# 어댑터 인터페이스: { id, type, ...config }
# 현재 type 지원: rss
# 추가 예정: posthog (top events), tavily/perplexity (뉴스), webhook
#
# 출력: out/source-candidates-<ts>.json — sns-start 3단계에서 주제 후보로 활용 가능

sources:
  # 자사 블로그 RSS
  - id: totaro-blog
    type: rss
    url: https://blog.totaro.co.kr/rss
    enabled: true
    maxItems: 5         # 최대 N건
    sinceDays: 14       # 최근 N일치만 (없으면 14)

  # 업계 뉴스 RSS — K-뷰티 산업 동향
  - id: kbeauty-news
    type: rss
    url: https://www.cosinkorea.com/rss/all
    enabled: false
    maxItems: 3
    sinceDays: 7

  # Atom 피드도 자동 인식
  - id: techcrunch-startups
    type: rss
    url: https://techcrunch.com/category/startups/feed/
    enabled: false
    maxItems: 5
    sinceDays: 7
