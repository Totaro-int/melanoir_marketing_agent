# company-profile.schema.yaml
# 회사 프로필 스키마 (v1) — /sns-onboard 명령이 채워 넣음.
# 필수 필드 누락 시 캠페인 생성을 차단한다.

$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://totaro.example.com/schemas/marketing_agent/company-profile/v1"
title: CompanyProfile
type: object
required: [version, brand, taglineOneLine, industry, targetAudience, tone, banned, channels]
properties:

  version:
    const: 1

  brand:
    type: object
    required: [name]
    properties:
      name:        { type: string, minLength: 1, description: "브랜드명 (한글 또는 영문)" }
      legalName:   { type: string, description: "법인명 (선택)" }
      websites:    { type: array, items: { type: string, format: uri } }

  taglineOneLine:
    type: string
    minLength: 5
    maxLength: 120
    description: "회사를 한 문장으로 (카피 생성에 직접 사용됨)"

  industry:
    type: string
    description: "산업/카테고리 (예: B2B SaaS - 결제 인프라)"

  targetAudience:
    type: array
    minItems: 1
    items:
      type: object
      required: [persona]
      properties:
        persona:   { type: string, description: "예: '국내 D2C 쇼핑몰 운영자'" }
        painPoints: { type: array, items: { type: string } }
        channelsTheyUse: { type: array, items: { type: string } }

  tone:
    type: object
    required: [preset]
    properties:
      preset:
        type: string
        enum: [professional, friendly, witty, bold, calm, premium, custom]
      voiceNotes:
        type: string
        description: "톤에 대한 자유 서술 (예: '~합니다 체. 이모지 절제. 영어 단어 최소화.')"
      sampleSentences:
        type: array
        items: { type: string }
        description: "기존에 쓰던 예시 문장 (있다면) — 모방 학습용"

  banned:
    type: object
    required: [words]
    properties:
      words:
        type: array
        items: { type: string }
        description: "금기어 (브랜드 가이드 위반)"
      topics:
        type: array
        items: { type: string }
        description: "금기 주제 (예: '경쟁사 비방', '정치')"
      claims:
        type: array
        items: { type: string }
        description: "금기 표현 (예: '업계 1위', '최고의')"

  writing:
    type: object
    description: "선택 — 글쓰기 스타일 세부 설정. copywriter가 카피 생성 시 참조."
    properties:
      formats:
        type: array
        items:
          type: string
          enum: [single_punchline, narrative_thread, data_driven, question_hook, listicle]
        description: "선호 포스트 포맷 (복수 가능). single_punchline=단타 임팩트, narrative_thread=스토리텔링, data_driven=수치 중심, question_hook=질문으로 시작, listicle=리스트형"
      sentenceLength:
        type: string
        enum: [short, medium, long]
        description: "문장 길이 선호. short=짧고 끊김, medium=보통, long=긴 서술형"
      ctaStyle:
        type: string
        enum: [direct, soft, implicit]
        description: "CTA 방식. direct=직접적('지금 시작하세요'), soft=제안형('한번 살펴보세요'), implicit=암시적(CTA 없이 궁금증 유발)"
      emojiUsage:
        type: string
        enum: [none, minimal, moderate]
        description: "이모지 사용 빈도. none=없음, minimal=강조 1~2개, moderate=자연스럽게 여러 개"
      referencePosts:
        type: array
        maxItems: 3
        items: { type: string }
        description: "좋아하는 실제 포스트 텍스트 예시 (최대 3개). copywriter가 스타일 학습용으로 사용."

  imageStyle:
    type: object
    description: "선택 — 이미지 생성 스타일 가이드. imagePromptFor()가 참조해 프롬프트를 강화."
    properties:
      aesthetic:
        type: string
        enum: [minimal_editorial, bold_graphic, warm_lifestyle, dark_luxury, playful_bright, swiss_type, custom]
        description: "전체 비주얼 방향. minimal_editorial=깔끔한 에디토리얼, bold_graphic=강렬한 그래픽, warm_lifestyle=따뜻한 감성, dark_luxury=다크 럭셔리, playful_bright=컬러풀 발랄, swiss_type=타이포그래피 중심, custom=아래 customAesthetic 참조"
      customAesthetic:
        type: string
        description: "aesthetic=custom일 때 자유 서술 (예: '90년대 레트로 그래픽 + 뉴트럴 팔레트')"
      colorMood:
        type: string
        enum: [brand_only, cool, warm, neutral, high_contrast]
        description: "색감 분위기. brand_only=브랜드 컬러만, cool=차가운 계열, warm=따뜻한 계열, neutral=무채색, high_contrast=흑백 고대비"
      preferAbstract:
        type: boolean
        description: "true=타이포그래피·도형 중심 추상, false=사물·공간·상황 표현 선호"
      avoidElements:
        type: array
        items: { type: string }
        description: "이미지에서 피할 요소 (예: ['gradient', 'human silhouette', 'stock photo feel', 'busy background'])"
      referencesBrands:
        type: array
        maxItems: 3
        items: { type: string }
        description: "시각적으로 닮고 싶은 브랜드·매체 (예: ['Linear', 'Stripe', 'Vercel']). 프롬프트에 스타일 참조로 주입."

  visual:
    type: object
    description: "선택 — 카드뉴스/이미지 생성 시 일관성 유지"
    properties:
      colors:
        type: object
        properties:
          primary:    { type: string, description: "예: '#0F172A'" }
          accent:     { type: string }
          background: { type: string }
      logoPath:    { type: string, description: "로컬 이미지 경로" }
      fontFamily:  { type: string }

  hashtags:
    type: object
    properties:
      always: { type: array, items: { type: string }, description: "모든 포스트에 항상 부착" }
      pool:   { type: array, items: { type: string }, description: "주제별로 선택해서 사용" }

  legal:
    type: object
    properties:
      adDisclosureRequired:
        type: boolean
        default: true
        description: "광고/협찬 표기 의무 (한국 공정위 가이드라인 기본 true)"
      adHashtag:
        type: string
        default: "#광고"

  channels:
    type: object
    description: "발행 가능한 SNS 채널 — onboard 단계에서 사용자가 선택. /sns-campaign-new --channels 미지정 시 enabled 기본값."
    required: [enabled]
    properties:
      enabled:
        type: array
        minItems: 1
        items:
          type: string
          enum: [naver-blog, tistory, brunch, threads, linkedin, instagram, facebook, x, reddit, bluesky, mastodon, pinterest, tiktok, youtube]
        description: "활성 채널 ID (블로그 naver-blog/tistory/brunch 포함). 토큰은 /sns-auth add <ch> 로 별도."

  campaigns:
    type: object
    properties:
      defaultGoals:
        type: array
        items:
          type: string
          enum: [awareness, lead, conversion, retention, recruiting]
      cadencePerWeek:
        type: integer
        minimum: 1
        maximum: 21
        description: "주간 발행 횟수 목표"

  competitors:
    type: array
    items:
      type: object
      properties:
        name:    { type: string }
        url:     { type: string, format: uri }
        notes:   { type: string }

  meta:
    type: object
    properties:
      createdAt: { type: string, format: date-time }
      updatedAt: { type: string, format: date-time }
      filledBy:  { type: string, enum: [interview, manual] }
