legal:
  adDisclosureRequired: true
  adHashtag: "#광고"
  regulatory:
    category: "위생용품 (위생용품 관리법)"
    notes: "의약품·의료기기 X — 효능 표방 금지"

channels:
  # browser-publish(크롬 쿠키 로그인) 지원 채널만. 레거시 API/OAuth 발행 제거(2026-06)로
  # facebook/x/reddit/bluesky/mastodon/pinterest 는 비활성.
  enabled:
    - naver-blog
    - tistory
    - brunch
    - instagram
    - threads
    - linkedin

writing:
  formats:
    - data_driven       # 수치·시험 결과 우선
    - single_punchline  # "다른 색소는 넣지 않았습니다" 류 단타 임팩트
  sentenceLength: medium
  ctaStyle: implicit   # B2B 전문가 — 압박형 CTA X
  emojiUsage: none
  referencePosts:
    - |
      안전하다는 말보다, 검출되지 않았다는 팩트를 믿으세요.

      28-FREE 유해물질 불검출. 무균 시험 적합. 자극 유발 인자 51% 감소
      (대조군 14.32 → 멜라누아 6.90, NO assay).

      안전 기준은 수치로 증명되어야 합니다. 멜라누아 엠보의 모든 데이터는
      공인기관 시험 결과를 따릅니다.

imageStyle:
  aesthetic: custom
  customAesthetic: "Premium Clinical Minimalism — 검정 모노톤 + 의료 사이언스 시각, lab-grade precision (브랜드북: monochromatic sophistication · scientific minimalism · the purest black)"
  colorMood: high_contrast   # 흑백 고대비 (Jet Black #0A0A0C / Pure White)
  preferAbstract: true    # 추상·과학 시각 우선
  moodWords: [precise, sterile, professional, premium, scientific, monochrome]
  avoidElements:
    - "캐주얼·라이프스타일 사진"
    - "인물 클로즈업 (B2B 매체이므로)"
    - "광고 배너 외양"
    - "컬러풀·플레이풀 톤"
    - "AI 슬롭 (광택·반사 과다)"
  referencesBrands:        # schema 최대 3개
    - "byredo"          # 미니멀 모노톤 럭셔리
    - "aesop"           # 의약·라보라토리 톤
    - "linear.app"      # 정밀·미니멀

campaigns:
  defaultGoals: [awareness, lead]
  cadencePerWeek: 2

