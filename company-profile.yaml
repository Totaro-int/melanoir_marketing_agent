version: 1

brand:
  name: Melanoir
  korName: 멜라누아
  legalName: 멜라누아
  websites:
    - https://melanoir.co.kr

taglineOneLine: "지구에서 가장 안전한 Black을 추구하다."

industry: "B2B — 반영구 화장(PMU) 색소 / 위생용품 / 시술 아티스트 전용"

targetAudience:
  - persona: "반영구 시술 아티스트 (PMU artist)"
    painPoints:
      - "기존 색소의 안전성·무균 우려 — 클레임 책임"
      - "시술 후 자극·트러블 — 고객 신뢰 손상"
      - "정품 보증·이력 추적이 어려운 시장"
      - "점도 불균일·번짐 — 시술 정밀도 저하"
      - "유해물질·중금속 검출 사고 우려"
    channelsTheyUse: [instagram, naver-blog, youtube, blog]
  - persona: "PMU 시술 학원·교육기관 운영자"
    painPoints:
      - "수강생에게 추천할 안전 표준 색소 부족"
      - "교육 단계부터 무균 시스템 도입의 어려움"
    channelsTheyUse: [naver-blog, instagram, brunch]

tone:
  preset: premium
  voiceNotes: |
    - 의료·과학 데이터 우선 — "안전하다"보다 "검출되지 않았다"는 팩트 톤.
    - "~합니다"체 + 단정적·정확함. 형용사 절제.
    - "압도적인 안정성", "최고의" 같은 형용사 광고톤 회피 — 데이터로 대체.
    - "Professionals Only" 강조 — 일반 소비자 대상 X.
    - 의료기기·의약품 효능 표방 절대 금지 (위생용품 관리법 준수).
    - 한자·외래어 적절 활용 (B2B 시술 전문가 대상).
  sampleSentences:
    - "지구에서 가장 안전한 Black을 추구하다."
    - "다른 색소는 넣지 않았습니다."
    - "안전하다는 말보다, 검출되지 않았다는 팩트를 믿으세요."
    - "흔들 필요 없이 균일합니다."
    - "오직 당신만을 위해 — 단 한 명의 고객을 위해 준비되는 시스템."

banned:
  words:
    - "최고의"
    - "최고"
    - "1위"
    - "1등"
    - "유일한"
    - "유일"
    - "완벽한"
    - "절대"
    - "베스트"
  topics:
    - "의약품·의료기기 효능 표방"
    - "치료·완치·예방 주장"
    - "의학적 작용 표현 (피부 재생·항노화 등)"
    - "경쟁사 직접 비방"
    - "정치·종교"
  claims:
    - "100% 안전"
    - "100% 무균"
    - "효과 보장"
    - "영구 효과"
    - "치료"
    - "완치"
    - "의학적으로 입증"
    - "임상적으로 증명"  # 단, 공인기관 시험 데이터는 사실대로 인용 OK
    - "부작용 없음"

visual:
  colors:
    primary:    "#000000"   # 핵심 — Pure Black
    accent:     "#FFFFFF"
    background: "#FFFFFF"
    foreground: "#000000"
    secondary:  "#0A0A0C"   # 브랜드북 Jet Black (10,10,12)
  fonts:
    heading: "Pretendard, Inter, sans-serif"   # 브랜드북 primary typeface
    body:    "Pretendard, Inter, sans-serif"
    data:    "JetBrains Mono"
  aestheticDirection: "Premium Clinical Minimalism — 검정 모노톤 + 의료 사이언스 시각. Lab-grade precision. 광고형 컬러풀 X."

hashtags:
  always:
    - "#Melanoir"
    - "#멜라누아"
    - "#멜라누아엠보"
  pool:
    # 한국어
    - "#반영구화장"
    - "#반영구색소"
    - "#엠보색소"
    - "#눈썹문신"
    - "#SMP시술"
    - "#두피문신"
    - "#안전색소"
    - "#순수멜라닌"
    - "#무균색소"
    - "#일회용색소"
    - "#멸균포장"
    - "#반영구시술"
    - "#PMU"
    - "#피그먼트"
    - "#색소"
    # 영어
    - "#permanentmakeup"
    - "#PMUartist"
    - "#cosmetictattoo"
    - "#micropigmentation"
    - "#scalpmicropigmentation"
